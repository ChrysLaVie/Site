<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste DISC — Avaliação Comportamental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#F5F1EA;
    --surface:#FFFFFF;
    --ink:#33322F;
    --ink-soft:#7A776E;
    --border:#E2DBC9;
    --d:#A9765C;
    --i:#B99A4E;
    --s:#7C8A6E;
    --c:#6D7B8A;
    --d-bg:#A9765C1a;
    --i-bg:#B99A4E1a;
    --s-bg:#7C8A6E1a;
    --c-bg:#6D7B8A1a;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Cormorant Garamond',serif; font-weight:500;}
  .mono,.label{font-family:'Jost',sans-serif;}
  #app{
    max-width:760px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  header.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:760px;
    margin:0 auto;
    padding:20px 20px 0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--ink);
  }
  .brand-mark{
    height:36px;width:auto;flex-shrink:0;
  }
  .brand-text{display:flex;flex-direction:column;line-height:1.1;}
  .brand-text .l1{font-family:'Jost',sans-serif;font-weight:500;font-size:13px;letter-spacing:0.08em;}
  .brand-text .l2{font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-soft);}
  .admin-link{
    background:none;
    border:1px solid var(--border);
    color:var(--ink-soft);
    font-family:'Jost',sans-serif;
    font-size:13px;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .admin-link:hover{border-color:var(--ink-soft); color:var(--ink);}
  .admin-link:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--c);
    outline-offset:2px;
  }
  .card{
    position:relative;
    overflow:hidden;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:36px;
  }
  .leaf-deco{
    position:absolute;
    top:-10px; right:-10px;
    width:130px; height:130px;
    opacity:0.35;
    pointer-events:none;
  }
  .leaf-deco path{fill:none;stroke:var(--ink-soft);stroke-width:1;}
  @media (max-width:600px){ .card{padding:24px 20px;} #app{padding:20px 14px 60px;} header.topbar{padding:16px 14px 0;} }

  /* WELCOME */
  .eyebrow{
    font-family:'Jost',sans-serif;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  h1.title{font-size:38px;font-weight:500;font-style:italic;line-height:1.15;margin:0 0 14px;}
  p.lede{font-size:17px;line-height:1.6;color:var(--ink-soft);margin:0 0 28px;max-width:52ch;}
  .quad-legend{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 30px;}
  .quad-item{display:flex;align-items:center;gap:8px;font-family:'Jost',sans-serif;font-size:13px;color:var(--ink-soft);}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  label.field-label{display:block;font-family:'Jost',sans-serif;font-size:13px;color:var(--ink-soft);margin-bottom:8px;}
  input[type=text]{
    width:100%;
    font-family:'Cormorant Garamond',serif;
    font-size:17px;
    padding:13px 16px;
    border:1px solid var(--border);
    border-radius:4px;
    background:var(--bg);
    color:var(--ink);
    margin-bottom:22px;
  }
  .btn-primary{
    font-family:'Jost',sans-serif;
    font-weight:600;
    font-size:15px;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:14px 26px;
    border-radius:999px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .btn-primary:hover{background:#33394a;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{background:#B7BCC4;cursor:not-allowed;}
  .btn-ghost{
    font-family:'Jost',sans-serif;
    font-size:14px;
    background:none;
    border:1px solid var(--border);
    color:var(--ink);
    padding:11px 20px;
    border-radius:999px;
    cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--ink-soft);}

  /* QUESTION SCREEN */
  .progress-track{
    height:6px;
    background:var(--border);
    border-radius:999px;
    overflow:hidden;
    margin-bottom:8px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--d),var(--i),var(--s),var(--c));
    background-size:400% 100%;
    transition:width .25s ease;
  }
  .progress-label{
    font-size:12px;color:var(--ink-soft);margin-bottom:26px;display:flex;justify-content:space-between;
  }
  .instruction{
    font-family:'Jost',sans-serif;
    font-size:14px;
    color:var(--ink-soft);
    margin-bottom:22px;
    line-height:1.5;
  }
  .word-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
  .word-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    border:1px solid var(--border);
    border-radius:4px;
    background:var(--bg);
  }
  .word-text{font-family:'Cormorant Garamond',serif;font-size:17px;}
  .pick-btn{
    font-family:'Jost',sans-serif;
    font-size:12px;
    border:1px solid var(--border);
    background:#fff;
    padding:8px 12px;
    border-radius:4px;
    cursor:pointer;
    white-space:nowrap;
    color:var(--ink-soft);
    transition:all .12s ease;
  }
  .pick-btn.most.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .pick-btn.least.active{background:#fff;color:var(--ink);border-color:var(--ink);text-decoration:underline;font-weight:600;}
  .pick-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .nav-row{display:flex;justify-content:space-between;align-items:center;}

  /* RESULT SCREEN */
  .compass-wrap{display:flex;justify-content:center;margin:6px 0 28px;}
  .result-name{font-size:14px;color:var(--ink-soft);margin-bottom:4px;}
  .result-title{font-size:30px;font-weight:500;font-style:italic;margin:0 0 4px;}
  .result-sub{font-size:15px;color:var(--ink-soft);margin:0 0 24px;}
  .bars{display:flex;flex-direction:column;gap:14px;margin-bottom:28px;}
  .bar-row{display:grid;grid-template-columns:120px 1fr 46px;align-items:center;gap:12px;}
  .bar-label{font-family:'Jost',sans-serif;font-size:13px;display:flex;align-items:center;gap:8px;}
  .bar-track{height:10px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;border-radius:999px;}
  .bar-pct{font-family:'Jost',sans-serif;font-size:13px;text-align:right;color:var(--ink-soft);}
  .desc-block{
    background:var(--bg);
    border-radius:4px;
    padding:20px 22px;
    font-size:15.5px;
    line-height:1.65;
    color:var(--ink);
    margin-bottom:26px;
  }
  .desc-block b{font-family:'Jost',sans-serif;}
  .saved-note{font-size:13px;color:var(--ink-soft);font-family:'Jost',sans-serif;margin-top:-14px;margin-bottom:22px;}

  /* ADMIN */
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{
    font-family:'Jost',sans-serif;
    font-size:12px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--ink-soft);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);
  }
  td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .pill{
    display:inline-block;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;
    padding:3px 10px;border-radius:999px;color:#fff;
  }
  .row-del{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:13px;font-family:'Jost',sans-serif;}
  .row-del:hover{color:var(--d);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);font-family:'Jost',sans-serif;font-size:14px;}
</style>
</head>

  // =============================================================================

  const DIMS = ['D','I','S','C'];
  const DIM_NAMES = {D:'Dominância', I:'Influência', S:'Estabilidade', C:'Conformidade'};
  const DIM_COLOR = {D:'var(--d)', I:'var(--i)', S:'var(--s)', C:'var(--c)'};
  const DIM_COLOR_HEX = {D:'#A9765C', I:'#B99A4E', S:'#7C8A6E', C:'#6D7B8A'};

  const POOL = {
    D: ["Decidido","Direto","Competitivo","Assertivo","Corajoso","Exigente","Determinado","Independente","Audacioso","Confiante","Enérgico","Ousado","Dominante","Impaciente","Autoritário","Firme","Arrojado","Persistente","Resoluto","Desafiador"],
    I: ["Comunicativo","Entusiasta","Persuasivo","Otimista","Sociável","Expressivo","Carismático","Espontâneo","Animado","Extrovertido","Inspirador","Amigável","Falante","Encantador","Divertido","Caloroso","Popular","Convincente","Impulsivo","Gregário"],
    S: ["Paciente","Leal","Calmo","Consistente","Cooperativo","Estável","Previsível","Gentil","Prestativo","Ponderado","Tranquilo","Confiável","Modesto","Atencioso","Complacente","Constante","Acolhedor","Discreto","Amável","Conciliador"],
    C: ["Preciso","Analítico","Cuidadoso","Organizado","Sistemático","Cauteloso","Detalhista","Lógico","Disciplinado","Criterioso","Metódico","Objetivo","Perfeccionista","Reservado","Formal","Rigoroso","Prudente","Investigativo","Meticuloso","Exato"]
  };
  const ROUNDS_COUNT = 20;
  const ROTATIONS = [['D','I','S','C'],['I','S','C','D'],['S','C','D','I'],['C','D','I','S']];
  const rounds = [];
  for(let i=0;i<ROUNDS_COUNT;i++){
    const order = ROTATIONS[i % 4];
    rounds.push(order.map(dim => ({dim, word: POOL[dim][i]})));
  }

  const DESC = {
    D: "foco em resultados, ritmo acelerado e disposição para decidir e assumir riscos. Comunicação direta e forte orientação a metas.",
    I: "comunicação expressiva, entusiasmo e facilidade natural para engajar e influenciar pessoas. Prefere ambientes colaborativos e dinâmicos.",
    S: "estabilidade, cooperação e consistência. Trabalha bem em equipe, valoriza processos previsíveis e relações de confiança duradouras.",
    C: "rigor analítico, atenção a detalhes e busca por precisão. Prefere seguir processos bem definidos e decidir com base em dados."
  };

  const DIM_RGB = {
    D:[169,118,92], I:[185,154,78], S:[124,138,110], C:[109,123,138]
  };
  const INK_RGB = [51,50,47];
  const INK_SOFT_RGB = [122,119,110];
  const BORDER_RGB = [226,219,201];

  // ---------- PDF ----------
  function buildPdfDoc(result){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageWidth = doc.internal.pageSize.getWidth();
    const marginX = 56;
    let y = 70;

    try{
      const logoEl = document.querySelector('.brand-mark');
      if(logoEl && logoEl.src) doc.addImage(logoEl.src, 'PNG', marginX, y-32, 34, 34);
    }catch(e){ console.warn('Não foi possível incluir a logo no PDF', e); }

    doc.setFont('times','italic');
    doc.setFontSize(19);
    doc.setTextColor(...INK_RGB);
    doc.text('La Vie Consultoria', marginX+44, y-8);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...INK_SOFT_RGB);
    doc.text('TESTE DISC · PERFIL COMPORTAMENTAL', marginX+44, y+6);

    y += 34;
    doc.setDrawColor(...BORDER_RGB);
    doc.line(marginX, y, pageWidth-marginX, y);
    y += 44;

    doc.setFont('times','italic');
    doc.setFontSize(25);
    doc.setTextColor(...INK_RGB);
    doc.text(result.name, marginX, y);
    y += 18;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...INK_SOFT_RGB);
    doc.text('Avaliação realizada em ' + new Date(result.timestamp).toLocaleDateString('pt-BR'), marginX, y);
    y += 38;

    const sorted = [...DIMS].sort((a,b)=> result.most[b]-result.most[a] || result.least[a]-result.least[b]);
    const primary = sorted[0], secondary = sorted[1];

    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor(...INK_RGB);
    doc.text('Perfil predominante: ' + DIM_NAMES[primary] + ' (' + primary + ')', marginX, y);
    y += 17;
    doc.setFont('helvetica','normal');
    doc.setTextColor(...INK_SOFT_RGB);
    doc.text('Perfil secundário: ' + DIM_NAMES[secondary] + ' (' + secondary + ')', marginX, y);
    y += 34;

    const barX = marginX+95;
    const barWidth = pageWidth - marginX - barX - 36;
    DIMS.forEach(d=>{
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.setTextColor(...INK_RGB);
      doc.text(DIM_NAMES[d], marginX, y+8);
      const pct = result.most[d]/ROUNDS_COUNT;
      doc.setFillColor(238,235,226);
      doc.roundedRect(barX, y, barWidth, 9, 2, 2, 'F');
      doc.setFillColor(...DIM_RGB[d]);
      doc.roundedRect(barX, y, Math.max(barWidth*pct,3), 9, 2, 2, 'F');
      doc.setFontSize(9);
      doc.setTextColor(...INK_SOFT_RGB);
      doc.text(Math.round(pct*100)+'%', barX+barWidth+8, y+8);
      y += 26;
    });

    y += 16;
    doc.setDrawColor(...BORDER_RGB);
    doc.line(marginX, y, pageWidth-marginX, y);
    y += 28;

    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.setTextColor(...INK_RGB);
    doc.text(DIM_NAMES[primary] + ':', marginX, y);
    y += 16;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10.5);
    doc.setTextColor(...INK_RGB);
    let lines = doc.splitTextToSize(DESC[primary], pageWidth - marginX*2);
    doc.text(lines, marginX, y);
    y += lines.length*14 + 22;

    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('Traço secundário — ' + DIM_NAMES[secondary] + ':', marginX, y);
    y += 16;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10.5);
    lines = doc.splitTextToSize(DESC[secondary], pageWidth - marginX*2);
    doc.text(lines, marginX, y);

    doc.setFontSize(8);
    doc.setTextColor(160,160,155);
    doc.text('La Vie Consultoria · lavieconsultoria.com', marginX, 800);

    return doc;
  }

  let state = {
    view:'welcome',
    name:'',
    email:'',
    phone:'',
    round:0,
    most:{D:0,I:0,S:0,C:0},
    least:{D:0,I:0,S:0,C:0},
    picks:[] // per round: {most:dim, least:dim}
  };

  const app = document.getElementById('app');

  function slugify(s){
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'candidato';
  }

  // ---------- STORAGE (Supabase) ----------
  async function saveResult(result){
    if(!supabaseReady){ console.warn('Supabase não configurado — resultado não foi salvo.'); return false; }
    try{
      const {error} = await supabaseClient.from('candidatos_disc').insert({
        name: result.name,
        email: result.email || null,
        phone: result.phone || null,
        most: result.most,
        least: result.least,
        pdf_url: result.pdf_url || null
      });
      if(error){ console.error('Erro ao salvar no Supabase', error); return false; }
      return true;
    }catch(e){ console.error('Erro ao salvar', e); return false; }
  }
  async function loadAllResults(){
    if(!supabaseReady) return [];
    try{
      const {data, error} = await supabaseClient
        .from('candidatos_disc')
        .select('*')
        .order('created_at', {ascending:false});
      if(error){ console.error('Erro ao carregar do Supabase', error); return []; }
      return (data||[]).map(row => ({
        id: row.id,
        name: row.name,
        timestamp: new Date(row.created_at).getTime(),
        most: row.most,
        least: row.least,
        pdf_url: row.pdf_url || null
      }));
    }catch(e){ console.error(e); return []; }
  }
  async function deleteResult(id){
    if(!supabaseReady) return;
    try{
      const {error} = await supabaseClient.from('candidatos_disc').delete().eq('id', id);
      if(error) console.error('Erro ao remover', error);
    }catch(e){ console.error(e); }
  }
  async function uploadPdf(result, doc){
    if(!supabaseReady) return null;
    try{
      const blob = doc.output('blob');
      const path = result.id + '.pdf';
      const {error: upErr} = await supabaseClient.storage
        .from('disc-pdfs')
        .upload(path, blob, {contentType:'application/pdf', upsert:true});
      if(upErr){ console.error('Erro ao enviar PDF', upErr); return null; }
      const {data} = supabaseClient.storage.from('disc-pdfs').getPublicUrl(path);
      return data?.publicUrl || null;
    }catch(e){ console.error('Erro ao enviar PDF', e); return null; }
  }

  // ---------- RENDER: WELCOME ----------
  function renderWelcome(){
    app.innerHTML = `

          <path d="M100 15 C 78 22, 62 40, 55 68 C 50 88, 52 105, 58 118"/>
          <path d="M63 45 C 72 40, 82 41, 90 48 C 84 52, 74 54, 63 45 Z"/>
          <path d="M55 68 C 66 65, 76 68, 83 76 C 75 80, 63 80, 55 68 Z"/>
          <path d="M53 92 C 63 90, 72 93, 78 101 C 70 105, 59 104, 53 92 Z"/>
        </svg>
        ${!supabaseReady ? `<div style="background:#F6E9D8;border:1px solid #E4C9A0;border-radius:4px;padding:12px 16px;margin-bottom:22px;font-family:'Jost',sans-serif;font-size:13px;color:#6B4E1F;">⚠ Supabase ainda não configurado — os resultados não serão salvos até você preencher SUPABASE_URL e SUPABASE_ANON_KEY no código.</div>` : ''}
        <div class="eyebrow">Avaliação comportamental · 20 rodadas · ~6 min</div>
        <h1 class="title">Teste DISC para candidatos</h1>
        <p class="lede">Em cada rodada, quatro palavras descrevem estilos de comportamento. Escolha a que <b>mais</b> e a que <b>menos</b> se parece com você no ambiente de trabalho.</p>
        <div class="quad-legend">
          <div class="quad-item"><span class="dot" style="background:var(--d)"></span>Dominância</div>
          <div class="quad-item"><span class="dot" style="background:var(--i)"></span>Influência</div>
          <div class="quad-item"><span class="dot" style="background:var(--s)"></span>Estabilidade</div>
          <div class="quad-item"><span class="dot" style="background:var(--c)"></span>Conformidade</div>
        </div>
        <label class="field-label" for="nameInput">Nome completo</label>
        <input type="text" id="nameInput" placeholder="Digite seu nome completo" autocomplete="off">
        <label class="field-label" for="emailInput">E-mail</label>
        <input type="text" id="emailInput" placeholder="seu@email.com" autocomplete="off">
        <label class="field-label" for="phoneInput">WhatsApp</label>
        <input type="text" id="phoneInput" placeholder="(00) 00000-0000" autocomplete="off">
        <div><button class="btn-primary" id="startBtn" disabled>Iniciar teste</button></div>
      </div>
    `;
    const input = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const phoneInput = document.getElementById('phoneInput');
    const btn = document.getElementById('startBtn');
    function checkForm(){
      btn.disabled = input.value.trim().length < 2 || emailInput.value.trim().length < 4;
    }
    input.addEventListener('input', checkForm);
    emailInput.addEventListener('input', checkForm);
    phoneInput.addEventListener('input', checkForm);
    btn.addEventListener('click', ()=>{
      state.name = input.value.trim();
      state.email = emailInput.value.trim();
      state.phone = phoneInput.value.trim();
      state.round = 0;
      state.most = {D:0,I:0,S:0,C:0};
      state.least = {D:0,I:0,S:0,C:0};
      state.picks = [];
      state.view = 'test';
      render();
    });
    input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !btn.disabled) btn.click(); });
  }

  // ---------- RENDER: TEST ----------
  function renderQuestion(){
    const r = rounds[state.round];
    let selMost = null, selLeast = null;

    function draw(){
      const pct = Math.round((state.round/ROUNDS_COUNT)*100);
      app.innerHTML = `
        <div class="card">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label"><span>Rodada ${state.round+1} de ${ROUNDS_COUNT}</span><span>${state.name}</span></div>
          <div class="instruction">Marque <b>M</b> na palavra que mais combina com você e <b>m</b> na que menos combina. Uma opção para cada.</div>
          <div class="word-grid">
            ${r.map((item,idx)=>`
              <div class="word-row" data-idx="${idx}">
                <div class="word-text">${item.word}</div>
                <button class="pick-btn most ${selMost===idx?'active':''}" data-action="most" data-idx="${idx}" ${selLeast===idx?'disabled':''}>${selMost===idx?'✓ Mais':'Mais'}</button>
                <button class="pick-btn least ${selLeast===idx?'active':''}" data-action="least" data-idx="${idx}" ${selMost===idx?'disabled':''}>${selLeast===idx?'✓ Menos':'Menos'}</button>
              </div>
            `).join('')}
          </div>
          <div class="nav-row">
            <button class="btn-ghost" id="backBtn" ${state.round===0?'disabled':''}>Voltar</button>
            <button class="btn-primary" id="nextBtn" ${(selMost===null||selLeast===null)?'disabled':''}>${state.round===ROUNDS_COUNT-1?'Ver resultado':'Próxima'}</button>
          </div>
        </div>
      `;
      app.querySelectorAll('.pick-btn').forEach(b=>{
        b.addEventListener('click', ()=>{
          const idx = parseInt(b.dataset.idx);
          if(b.dataset.action==='most') selMost = (selMost===idx)?null:idx;
          else selLeast = (selLeast===idx)?null:idx;
          draw();
        });
      });
      const back = document.getElementById('backBtn');
      if(back && state.round>0){
        back.addEventListener('click', ()=>{
          const prev = state.picks.pop();
          if(prev){
            state.most[prev.mostDim]--; state.least[prev.leastDim]--;
          }
          state.round--;
          render();
        });
      }
      document.getElementById('nextBtn').addEventListener('click', ()=>{
        const mostDim = r[selMost].dim, leastDim = r[selLeast].dim;
        state.picks.push({mostDim, leastDim});
        state.most[mostDim]++; state.least[leastDim]++;
        if(state.round===ROUNDS_COUNT-1){
          finishTest();
        } else {
          state.round++;
          render();
        }
      });
    }
    draw();
  }

  async function finishTest(){
    const result = {
      id: slugify(state.name)+'-'+Date.now(),
      name: state.name,
      timestamp: Date.now(),
      most: {...state.most},
      least: {...state.least}
    };
    const doc = buildPdfDoc(result);
    state.lastPdfDoc = doc;
    state.view = 'result';
    state.lastResult = result;
    state.pdfSaving = supabaseReady;
    render();

    const pdfUrl = await uploadPdf(result, doc);
    result.pdf_url = pdfUrl;
    state.pdfSaving = false;
    await saveResult(result);
    if(state.view === 'result' && state.lastResult && state.lastResult.id === result.id){
      render();
    }
  }

  // ---------- COMPASS SVG ----------
  function compassSVG(most){
    const cx=120, cy=120, r=100;
    const xVal = ((most.I+most.S)-(most.D+most.C))/40; // -1..1, right = people-oriented
    const yVal = ((most.D+most.I)-(most.S+most.C))/40; // -1..1, up = fast-paced
    const px = cx + xVal*r*0.85;
    const py = cy - yVal*r*0.85;
    return `
    <svg width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="Mapa comportamental DISC">
      <defs>
        <clipPath id="circleClip"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath>
      </defs>
      <g clip-path="url(#circleClip)">
        <rect x="${cx-r}" y="${cy-r}" width="${r}" height="${r}" fill="${DIM_COLOR_HEX.D}" opacity="0.13"/>
        <rect x="${cx}" y="${cy-r}" width="${r}" height="${r}" fill="${DIM_COLOR_HEX.I}" opacity="0.13"/>
        <rect x="${cx}" y="${cy}" width="${r}" height="${r}" fill="${DIM_COLOR_HEX.S}" opacity="0.13"/>
        <rect x="${cx-r}" y="${cy}" width="${r}" height="${r}" fill="${DIM_COLOR_HEX.C}" opacity="0.13"/>
      </g>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#D8DCE0" stroke-width="1.5"/>
      <line x1="${cx-r}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#D8DCE0" stroke-width="1"/>
      <line x1="${cx}" y1="${cy-r}" x2="${cx}" y2="${cy+r}" stroke="#D8DCE0" stroke-width="1"/>
      <text x="${cx-r+8}" y="${cy-r+18}" font-family="Jost" font-size="11" fill="${DIM_COLOR_HEX.D}" font-weight="600">D</text>
      <text x="${cx+r-18}" y="${cy-r+18}" font-family="Jost" font-size="11" fill="${DIM_COLOR_HEX.I}" font-weight="600">I</text>
      <text x="${cx+r-18}" y="${cy+r-8}" font-family="Jost" font-size="11" fill="${DIM_COLOR_HEX.S}" font-weight="600">S</text>
      <text x="${cx-r+8}" y="${cy+r-8}" font-family="Jost" font-size="11" fill="${DIM_COLOR_HEX.C}" font-weight="600">C</text>
      <circle cx="${px}" cy="${py}" r="7" fill="#1F2430"/>
      <circle cx="${px}" cy="${py}" r="12" fill="none" stroke="#1F2430" stroke-width="1.5" opacity="0.4"/>
    </svg>`;
  }

  // ---------- RENDER: RESULT ----------
  function renderResult(){
    const result = state.lastResult;
    const most = result.most;
    const sorted = [...DIMS].sort((a,b)=> most[b]-most[a] || result.least[a]-result.least[b]);
    const primary = sorted[0], secondary = sorted[1];
    app.innerHTML = `
      <div class="card">
        <div class="result-name mono">RESULTADO · ${new Date(result.timestamp).toLocaleDateString('pt-BR')}</div>
        <h2 class="result-title">${result.name}</h2>
        <p class="result-sub">Perfil predominante: <b>${DIM_NAMES[primary]} (${primary})</b> · secundário: <b>${DIM_NAMES[secondary]} (${secondary})</b></p>
        <div class="compass-wrap">${compassSVG(most)}</div>
        <div class="bars">
          ${DIMS.map(d=>`
            <div class="bar-row">
              <div class="bar-label"><span class="dot" style="background:${DIM_COLOR[d]}"></span>${DIM_NAMES[d]}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(most[d]/ROUNDS_COUNT*100)}%;background:${DIM_COLOR[d]}"></div></div>
              <div class="bar-pct">${Math.round(most[d]/ROUNDS_COUNT*100)}%</div>
            </div>
          `).join('')}
        </div>
        <div class="desc-block">
          <b>${DIM_NAMES[primary]}:</b> ${DESC[primary]}<br><br>
          <b>Traço secundário — ${DIM_NAMES[secondary]}:</b> ${DESC[secondary]}
        </div>
        <div style="background:#EEF4EC;border:1px solid #B8D4B0;border-radius:4px;padding:14px 18px;margin-bottom:20px;font-family:'Jost',sans-serif;font-size:13px;color:#2D5A27;">
          ✓ Obrigada por completar o teste! Seu perfil foi registrado e nossa equipe entrará em contato em breve.
        </div>
        <div class="saved-note">${
          !supabaseReady
            ? 'Configure o Supabase para que o PDF fique disponível também no painel do recrutador.'
            : state.pdfSaving
              ? 'Salvando uma cópia em PDF para o painel do recrutador…'
              : 'Uma cópia em PDF deste resultado já está salva no painel do recrutador.'
        }</div>
        <div class="nav-row" style="justify-content:flex-start;gap:12px;">
          <button class="btn-primary" id="downloadPdfBtn">Baixar meu PDF</button>
          <button class="btn-ghost" id="restartBtn">Novo candidato</button>
        </div>
      </div>
    `;
    document.getElementById('downloadPdfBtn').addEventListener('click', ()=>{
      const doc = state.lastPdfDoc || buildPdfDoc(result);
      doc.save('teste-disc-' + slugify(result.name) + '.pdf');
    });
    document.getElementById('restartBtn').addEventListener('click', ()=>{
      state = {view:'welcome', name:'', email:'', phone:'', round:0, most:{D:0,I:0,S:0,C:0}, least:{D:0,I:0,S:0,C:0}, picks:[]};
      render();
    });
  }

  // ---------- RENDER: ADMIN ----------
  async function renderAdmin(){
    app.innerHTML = `<div class="card"><div class="eyebrow">Painel do recrutador</div><h2 class="title" style="font-size:22px;margin-bottom:18px;">Resultados dos candidatos</h2><div id="adminBody" class="empty-state">Carregando resultados…</div></div>`;
    const results = await loadAllResults();
    const body = document.getElementById('adminBody');
    if(!results.length){
      body.innerHTML = 'Nenhum candidato concluiu o teste ainda.';
      return;
    }
    body.outerHTML = `
      <table>
        <thead><tr><th>Candidato</th><th>Data</th><th>Perfil</th><th>D</th><th>I</th><th>S</th><th>C</th><th>PDF</th><th></th></tr></thead>
        <tbody>
          ${results.map(r=>{
            const sorted=[...DIMS].sort((a,b)=>r.most[b]-r.most[a]);
            const primary=sorted[0];
            return `<tr data-id="${r.id}">
              <td>${r.name}</td>
              <td class="mono">${new Date(r.timestamp).toLocaleDateString('pt-BR')}</td>
              <td><span class="pill" style="background:${DIM_COLOR_HEX[primary]}">${primary} · ${DIM_NAMES[primary]}</span></td>
              <td class="mono">${Math.round(r.most.D/ROUNDS_COUNT*100)}%</td>
              <td class="mono">${Math.round(r.most.I/ROUNDS_COUNT*100)}%</td>
              <td class="mono">${Math.round(r.most.S/ROUNDS_COUNT*100)}%</td>
              <td class="mono">${Math.round(r.most.C/ROUNDS_COUNT*100)}%</td>
              <td>${r.pdf_url ? `<a href="${r.pdf_url}" target="_blank" rel="noopener">abrir</a>` : '—'}</td>
              <td><button class="row-del" data-id="${r.id}">remover</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
    app.querySelectorAll('.row-del').forEach(b=>{
      b.addEventListener('click', async ()=>{
        await deleteResult(b.dataset.id);
        renderAdmin();
      });
    });
  }

  function render(){
    if(state.view==='welcome') renderWelcome();
    else if(state.view==='test') renderQuestion();
    else if(state.view==='result') renderResult();
    else if(state.view==='admin') renderAdmin();
  }

  document.getElementById('adminToggle').addEventListener('click', ()=>{
    if(state.view==='admin'){
      state.view = 'welcome';
      render();
      return;
    }
    const pass = prompt('Senha do painel do recrutador:');
    if(pass === ADMIN_PASSWORD){
      state.view = 'admin';
      render();
    } else if(pass !== null){
      alert('Senha incorreta.');
    }
  });

  render();
})();
</script>
</body>
</html>
