<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação Comportamental DISC — La Vie Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #F5F1EA;
  --surface: #FFFFFF;
  --ink: #2C2B28;
  --ink-soft: #7A776E;
  --border: #E2DBC9;
  --d: #9B6B52;
  --i: #B08A3E;
  --s: #6B7A5E;
  --c: #5E6E7D;
  --d-bg: #9B6B5215;
  --i-bg: #B08A3E15;
  --s-bg: #6B7A5E15;
  --c-bg: #5E6E7D15;
  --radius: 8px;
  --shadow: 0 2px 24px rgba(0,0,0,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Jost', sans-serif; -webkit-font-smoothing: antialiased; }

/* LAYOUT */
.topbar { display: flex; justify-content: space-between; align-items: center; max-width: 780px; margin: 0 auto; padding: 22px 20px 0; }
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.brand-mark { height: 38px; width: auto; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand-l1 { font-weight: 500; font-size: 13px; letter-spacing: 0.07em; }
.brand-l2 { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); }
.admin-btn { background: none; border: 1px solid var(--border); color: var(--ink-soft); font-family: 'Jost', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 99px; cursor: pointer; transition: all .15s; }
.admin-btn:hover { border-color: var(--ink-soft); color: var(--ink); }

#app { max-width: 780px; margin: 0 auto; padding: 28px 20px 80px; }

/* CARD */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 40px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.card-deco { position: absolute; top: -20px; right: -20px; width: 160px; height: 160px; opacity: 0.2; pointer-events: none; }

/* EYEBROW & TITLES */
.eyebrow { display: block; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
.title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 500; line-height: 1.15; margin-bottom: 14px; }
.title em { font-style: italic; }
.lede { font-size: 15px; line-height: 1.75; color: var(--ink-soft); font-weight: 300; margin-bottom: 28px; max-width: 54ch; }

/* PROFILE LEGEND */
.profile-legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
.profile-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-soft); }
.profile-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* FORM */
.field-label { display: block; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; margin-bottom: 7px; margin-top: 18px; }
.field-label:first-of-type { margin-top: 0; }
input[type=text], input[type=email], input[type=tel] {
  width: 100%; font-family: 'Cormorant Garamond', serif; font-size: 17px;
  padding: 13px 16px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); color: var(--ink); transition: border-color .15s;
}
input:focus { outline: none; border-color: var(--ink-soft); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* BUTTONS */
.btn-primary { font-family: 'Jost', sans-serif; font-weight: 600; font-size: 14px; background: var(--ink); color: #fff; border: none; padding: 14px 28px; border-radius: 99px; cursor: pointer; transition: background .15s, transform .1s; letter-spacing: 0.03em; }
.btn-primary:hover { background: #3a3935; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { background: #C4BFB4; cursor: not-allowed; }
.btn-ghost { font-family: 'Jost', sans-serif; font-size: 14px; background: none; border: 1px solid var(--border); color: var(--ink); padding: 12px 22px; border-radius: 99px; cursor: pointer; transition: border-color .15s; }
.btn-ghost:hover { border-color: var(--ink-soft); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }

/* PROGRESS */
.progress-wrap { margin-bottom: 28px; }
.progress-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; background: var(--ink); border-radius: 99px; transition: width .3s ease; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); }

/* SORT / DRAG */
.sort-instruction { font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 22px; background: var(--bg); padding: 14px 16px; border-radius: 5px; border-left: 3px solid var(--border); }
.sort-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
.sort-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 6px;
  cursor: grab; user-select: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.sort-item:hover { border-color: #C4BFB4; background: #FDFCF9; }
.sort-item.dragging { opacity: 0.4; cursor: grabbing; }
.sort-item.drag-over { border-color: var(--ink); background: #FDFCF9; box-shadow: 0 0 0 3px rgba(44,43,40,0.08); }
.sort-rank {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  transition: background .2s;
}
.sort-phrase { font-size: 15px; color: var(--ink); line-height: 1.45; flex: 1; font-weight: 300; }
.sort-phrase b { font-weight: 600; }
.sort-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); flex-shrink: 0; }
.sort-handle { color: #C4BFB4; font-size: 18px; flex-shrink: 0; margin-left: 4px; }
.sort-tip { font-size: 11px; color: var(--ink-soft); text-align: center; margin-top: 6px; letter-spacing: 0.04em; }

/* RESULT */
.result-header { margin-bottom: 28px; }
.result-name { font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; }
.result-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 500; font-style: italic; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--ink-soft); font-weight: 300; }
.profile-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; margin-right: 8px; margin-bottom: 8px; }

/* BARS */
.bars { display: flex; flex-direction: column; gap: 16px; margin: 24px 0; }
.bar-row { display: grid; grid-template-columns: 130px 1fr 46px; align-items: center; gap: 12px; }
.bar-label { font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.bar-track { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
.bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
.bar-pct { font-size: 12px; color: var(--ink-soft); text-align: right; }

/* DESC BLOCKS */
.desc-section { margin: 24px 0; }
.desc-section h4 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; margin-bottom: 10px; }
.desc-block { background: var(--bg); border-radius: 6px; padding: 18px 20px; font-size: 14.5px; line-height: 1.75; color: var(--ink); margin-bottom: 12px; font-weight: 300; }

/* TWO-COL */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
.col-card { background: var(--bg); border-radius: 6px; padding: 18px; }
.col-card h5 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
.col-card ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.col-card li { font-size: 13.5px; color: var(--ink); font-weight: 300; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
.col-card li::before { content: '•'; color: var(--ink-soft); flex-shrink: 0; margin-top: 1px; }

/* COMPASS SVG AREA */
.compass-wrap { display: flex; justify-content: center; margin: 20px 0; }

/* SAVED NOTE */
.saved-note { font-size: 12px; color: var(--ink-soft); margin: 12px 0; font-style: italic; }
.confirm-box { background: #EEF4EC; border: 1px solid #B8D4B0; border-radius: 6px; padding: 14px 18px; font-size: 13px; color: #2D5A27; margin-bottom: 18px; }

/* ADMIN */
.admin-table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-soft); text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; color: #fff; letter-spacing: 0.04em; }
.del-btn { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 12px; font-family: 'Jost', sans-serif; }
.del-btn:hover { color: var(--d); }
.empty-state { text-align: center; padding: 50px 20px; color: var(--ink-soft); font-size: 14px; }

/* WARNING */
.warning-box { background: #FDF5E6; border: 1px solid #E8C87A; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #7A5200; margin-bottom: 22px; }

@media (max-width: 600px) {
  .card { padding: 24px 18px; }
  #app { padding: 20px 12px 60px; }
  .topbar { padding: 16px 12px 0; }
  .field-row { grid-template-columns: 1fr; }
  .bar-row { grid-template-columns: 100px 1fr 40px; }
  .two-col { grid-template-columns: 1fr; }
  .title { font-size: 28px; }
}
</style>
</head>

async function saveResult(r) {
  if (!db) return;
  try {
    await db.from('candidatos_disc').insert({
      name: r.name, email: r.email || null, phone: r.phone || null,
      most: r.scores, least: null, pdf_url: null,
      primary_profile: r.primary, secondary_profile: r.secondary
    });
  } catch(e) { console.error(e); }
}

async function loadResults() {
  if (!db) return [];
  try {
    const { data } = await db.from('candidatos_disc').select('*').order('created_at', { ascending: false });
    return data || [];
  } catch(e) { return []; }
}

async function deleteResult(id) {
  if (!db) return;
  try { await db.from('candidatos_disc').delete().eq('id', id); } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// RENDER: TEST (drag-and-drop)
// ═══════════════════════════════════════════════════════
function renderTest() {
  const roundData = ROUNDS[state.round];
  const dims = ['D', 'I', 'S', 'C'];
  // Embaralhar ordem de exibição
  let order = [...dims].sort(() => Math.random() - 0.5);

  const RANK_COLORS = ['#2C2B28', '#6B7A5E', '#B08A3E', '#C4BFB4'];
  const RANK_LABELS = ['Mais parecido comigo', '', '', 'Menos parecido comigo'];

  function draw() {
    const pct = Math.round((state.round / ROUNDS_N) * 100);
    app.innerHTML = `
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-info"><span>Situação ${state.round + 1} de ${ROUNDS_N}</span><span>${state.name}</span></div>
        </div>
        <div class="sort-instruction">
          👆 <strong>Arraste</strong> as frases para ordenar da que <strong>mais</strong> combina com você (posição 1) até a que <strong>menos</strong> combina (posição 4).
        </div>
        <div class="sort-list" id="sortList">
          ${order.map((dim, rankIdx) => `
            <div class="sort-item" draggable="true" data-dim="${dim}" data-rank="${rankIdx}">
              <span class="sort-rank" style="background:${RANK_COLORS[rankIdx]}">${rankIdx + 1}</span>
              <span class="sort-phrase">${roundData[dim]}</span>
              <span class="sort-tag">${RANK_LABELS[rankIdx]}</span>
              <span class="sort-handle">⠿</span>
            </div>
          `).join('')}
        </div>
        <p class="sort-tip">No celular: segure e arraste para reordenar</p>
        <div class="btn-row">
          <button class="btn-ghost" id="backBtn" ${state.round === 0 ? 'disabled' : ''}>← Voltar</button>
          <button class="btn-primary" id="nextBtn">${state.round === ROUNDS_N - 1 ? 'Ver meu resultado →' : 'Próxima →'}</button>
        </div>
      </div>
    `;

    // Drag & drop
    const list = document.getElementById('sortList');
    let dragSrc = null;

    list.querySelectorAll('.sort-item').forEach(item => {
      item.addEventListener('dragstart', e => {
        dragSrc = item;
        setTimeout(() => item.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        list.querySelectorAll('.sort-item').forEach(i => i.classList.remove('drag-over'));
        order = [...list.querySelectorAll('.sort-item')].map(el => el.dataset.dim);
        draw();
      });
      item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrc === item) return;
        const items = [...list.querySelectorAll('.sort-item')];
        if (items.indexOf(dragSrc) < items.indexOf(item)) item.after(dragSrc);
        else item.before(dragSrc);
        order = [...list.querySelectorAll('.sort-item')].map(el => el.dataset.dim);
        draw();
      });

      // Touch
      let ty0 = 0;
      item.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; item.classList.add('dragging'); }, { passive: true });
      item.addEventListener('touchmove', e => {
        e.preventDefault();
        const y = e.touches[0].clientY;
        const els = [...list.querySelectorAll('.sort-item')];
        els.forEach(el => {
          if (el === item) return;
          const r = el.getBoundingClientRect();
          if (y > r.top && y < r.bottom) {
            if (els.indexOf(item) < els.indexOf(el)) el.after(item);
            else el.before(item);
          }
        });
      }, { passive: false });
      item.addEventListener('touchend', () => {
        item.classList.remove('dragging');
        order = [...list.querySelectorAll('.sort-item')].map(el => el.dataset.dim);
        draw();
      });
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      if (state.round === 0) return;
      const prev = state.picks.pop();
      if (prev) {
        state.scores[prev.most] -= 3;
        state.scores[prev.second] -= 1;
        state.scores[prev.secondLast] -= -1;
        state.scores[prev.least] -= -3;
      }
      state.round--;
      render();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      // Pontuação: 1o = +3, 2o = +1, 3o = -1, 4o = -3
      const pts = [3, 1, -1, -3];
      order.forEach((dim, i) => { state.scores[dim] += pts[i]; });
      state.picks.push({ most: order[0], second: order[1], secondLast: order[2], least: order[3] });
      if (state.round === ROUNDS_N - 1) finishTest();
      else { state.round++; render(); }
    });
  }

  draw();
}

async function finishTest() {
  const scores = state.scores;
  const sorted = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
  const primary = sorted[0], secondary = sorted[1];

  const result = {
    name: state.name, email: state.email, phone: state.phone,
    scores, primary, secondary,
    timestamp: Date.now()
  };

  state.lastResult = result;
  state.view = 'result';
  render();
  await saveResult(result);
}

// ═══════════════════════════════════════════════════════
// PDF
// ═══════════════════════════════════════════════════════
function buildPDF(r) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 52;
  let y = 70;

  const INK = [44, 43, 40];
  const SOFT = [122, 119, 110];
  const BORDER = [226, 219, 201];
  const BG = [245, 241, 234];

  const primary = r.primary, secondary = r.secondary;
  const profile = PROFILES[primary];
  const scores = r.scores;
  const minS = Math.min(...Object.values(scores));
  const maxS = Math.max(...Object.values(scores));
  const range = maxS - minS || 1;

  const DIM_RGB = { D:[155,107,82], I:[176,138,62], S:[107,122,94], C:[94,110,125] };

  // Header
  doc.setFont('times', 'italic');
  doc.setFontSize(20);
  doc.setTextColor(...INK);
  doc.text('La Vie Consultoria', M, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(...SOFT);
  doc.text('AVALIAÇÃO COMPORTAMENTAL DISC', M, y + 14);

  doc.setDrawColor(...BORDER);
  doc.line(M, y + 26, W - M, y + 26);
  y += 46;

  // Nome e data
  doc.setFont('times', 'italic');
  doc.setFontSize(26);
  doc.setTextColor(...INK);
  doc.text(r.name, M, y);
  y += 18;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...SOFT);
  doc.text('Avaliação realizada em ' + new Date(r.timestamp).toLocaleDateString('pt-BR'), M, y);
  y += 30;

  // Perfis
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(...INK);
  doc.text('Perfil predominante: ' + DIM[primary].name + ' (' + primary + ')', M, y);
  y += 16;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.setTextColor(...SOFT);
  doc.text('Perfil secundário: ' + DIM[secondary].name + ' (' + secondary + ')', M, y);
  y += 30;

  // Barras
  const barX = M + 120;
  const barW = W - M - barX - 40;
  Object.keys(scores).forEach(d => {
    const pct = (scores[d] - minS) / range;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(...INK);
    doc.text(DIM[d].name, M, y + 8);
    doc.setFillColor(238, 235, 226);
    doc.roundedRect(barX, y, barW, 9, 2, 2, 'F');
    doc.setFillColor(...DIM_RGB[d]);
    doc.roundedRect(barX, y, Math.max(barW * pct, 4), 9, 2, 2, 'F');
    doc.setFontSize(9);
    doc.setTextColor(...SOFT);
    doc.text((scores[d] > 0 ? '+' : '') + scores[d], barX + barW + 8, y + 8);
    y += 24;
  });

  y += 16;
  doc.setDrawColor(...BORDER);
  doc.line(M, y, W - M, y);
  y += 22;

  // Resumo
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(...INK);
  doc.text('Como você age no trabalho', M, y);
  y += 15;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  let lines = doc.splitTextToSize(profile.full, W - M * 2);
  doc.text(lines, M, y);
  y += lines.length * 13 + 20;

  // Dois boxes
  if (y > 580) { doc.addPage(); y = 60; }

  const bW = (W - M * 2 - 14) / 2;
  // Pontos fortes
  doc.setFillColor(...BG);
  doc.roundedRect(M, y, bW, 130, 3, 3, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(...INK);
  doc.text('PONTOS FORTES', M + 12, y + 17);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...SOFT);
  profile.strengths.slice(0, 4).forEach((s, i) => {
    doc.text('• ' + s, M + 12, y + 33 + i * 22);
  });
  // Pontos de atenção
  const b2X = M + bW + 14;
  doc.setFillColor(...BG);
  doc.roundedRect(b2X, y, bW, 130, 3, 3, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(...INK);
  doc.text('PONTOS DE ATENÇÃO', b2X + 12, y + 17);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...SOFT);
  profile.challenges.forEach((s, i) => {
    doc.text('• ' + s, b2X + 12, y + 33 + i * 22);
  });
  y += 144;

  // Motivação e funções ideais
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(...INK);
  doc.text('O que te motiva:', M, y);
  y += 14;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...SOFT);
  lines = doc.splitTextToSize(profile.motivation, W - M * 2);
  doc.text(lines, M, y);
  y += lines.length * 13 + 14;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(...INK);
  doc.text('Funções ideais:', M, y);
  y += 14;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...SOFT);
  lines = doc.splitTextToSize(profile.ideal_roles, W - M * 2);
  doc.text(lines, M, y);

  // Rodapé
  doc.setFontSize(8);
  doc.setTextColor(180, 175, 168);
  doc.text('La Vie Consultoria · lavieconsultoria.com · Este resultado é um instrumento de autoconhecimento profissional, não um diagnóstico definitivo.', M, 822);

  doc.save('disc-lavie-' + r.name.toLowerCase().replace(/\s+/g, '-') + '.pdf');
}

// ═══════════════════════════════════════════════════════
// RENDER: ADMIN
// ═══════════════════════════════════════════════════════
async function renderAdmin() {
  app.innerHTML = `
    <div class="card">
      <span class="eyebrow">Painel do recrutador</span>
      <h2 class="title" style="font-size:24px;margin-bottom:6px;">Resultados dos candidatos</h2>
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:24px;">Avaliações recebidas pela plataforma DISC La Vie</p>
      <div id="adminBody" class="empty-state">Carregando...</div>
    </div>
  `;

  const results = await loadResults();
  const body = document.getElementById('adminBody');

  if (!results.length) {
    body.innerHTML = 'Nenhuma avaliação recebida ainda.';
    return;
  }

  body.innerHTML = `
    <div class="admin-table-wrap">
      <table>
        <tr>
          <th>Data</th><th>Nome</th><th>E-mail</th><th>WhatsApp</th>
          <th>Perfil primário</th><th>Perfil secundário</th><th>D</th><th>I</th><th>S</th><th>C</th><th></th>
        </tr>
        ${results.map(r => {
          const primary = r.primary_profile || (r.most ? Object.keys(r.most).sort((a,b) => r.most[b]-r.most[a])[0] : '?');
          const secondary = r.secondary_profile || '?';
          return `<tr>
            <td>${new Date(r.created_at).toLocaleDateString('pt-BR')}</td>
            <td>${r.name}</td>
            <td>${r.email || '—'}</td>
            <td>${r.phone || '—'}</td>
            <td><span class="pill" style="background:${DIM[primary]?.color || '#999'}">${DIM[primary]?.name || primary}</span></td>
            <td><span class="pill" style="background:${DIM[secondary]?.color || '#ccc'};opacity:0.85">${DIM[secondary]?.name || secondary}</span></td>
            <td>${r.most?.D ?? '—'}</td><td>${r.most?.I ?? '—'}</td><td>${r.most?.S ?? '—'}</td><td>${r.most?.C ?? '—'}</td>
            <td><button class="del-btn" data-id="${r.id}">remover</button></td>
          </tr>`;
        }).join('')}
      </table>
    </div>
    <p style="font-size:12px;color:var(--ink-soft);margin-top:16px;">${results.length} avaliação(ões) no total</p>
  `;

  body.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remover este candidato?')) return;
      await deleteResult(btn.dataset.id);
      renderAdmin();
    });
  });
}

// ═══════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════
function render() {
  if (state.view === 'welcome') renderWelcome();
  else if (state.view === 'test') renderTest();
  else if (state.view === 'result') renderResult();
  else if (state.view === 'admin') renderAdmin();
}

// Admin button
document.getElementById('adminBtn').addEventListener('click', () => {
  if (state.view === 'admin') { state.view = 'welcome'; render(); return; }
  const pw = prompt('Senha do recrutador:');
  if (pw === ADMIN_PASS) { state.view = 'admin'; render(); }
  else if (pw !== null) alert('Senha incorreta.');
});

render();

})();
</script>
</body>
</html>
