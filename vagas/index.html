<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas — La Vie Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,340;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg: #EDE7D8;
  --surface: #FBF8F1;
  --ink: #241F1A;
  --ink-soft: #766F60;
  --ink-faint: #A69F8C;
  --line: #D9CFB8;
  --rust: #A0472A;
  --rust-deep: #7E381F;
  --olive: #5F6B4C;
  --olive-bg: #EAEBDF;
  --olive-line: #C4CBAE;
  --radius: 3px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Instrument Sans', sans-serif; -webkit-font-smoothing: antialiased; }
.serif { font-family: 'Fraunces', serif; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* ═══ TOPBAR ═══ */
.topbar { display: flex; justify-content: space-between; align-items: center; max-width: 1040px; margin: 0 auto; padding: 26px 24px 0; }
.brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
.brand-mark { height: 34px; width: auto; }
.brand-text { display: flex; flex-direction: column; line-height: 1.2; }
.brand-l1 { font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; font-size: 16px; }
.brand-l2 { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); }
.admin-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); background: none; border: none; border-bottom: 1px solid var(--line); padding: 0 0 3px; cursor: pointer; transition: color .15s, border-color .15s; }
.admin-link:hover { color: var(--rust); border-color: var(--rust); }

#app { max-width: 1040px; margin: 0 auto; padding: 40px 24px 100px; position: relative; }

/* ═══ HERO ═══ */
.page-hero { margin-bottom: 56px; position: relative; padding-top: 8px; }
.leaf-accent { position: absolute; top: -18px; right: -6px; width: 130px; height: auto; color: var(--rust); opacity: 0.5; pointer-events: none; }
.hero-eyebrow { display: flex; align-items: center; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rust-deep); margin-bottom: 18px; }
.hero-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--rust-deep); display: inline-block; }
.page-title { font-family: 'Fraunces', serif; font-size: 46px; font-weight: 340; line-height: 1.08; letter-spacing: -0.01em; margin-bottom: 20px; max-width: 14ch; }
.page-title em { font-style: italic; font-weight: 500; }
.hero-rule { width: 64px; height: 1px; background: var(--line); margin-bottom: 20px; }
.page-sub { font-size: 15px; line-height: 1.7; color: var(--ink-soft); font-weight: 400; max-width: 48ch; }

/* ═══ LEDGER (lista de vagas / candidaturas) ═══ */
.ledger { border-top: 1px solid var(--ink); }
.ledger-row { border-bottom: 1px solid var(--line); padding: 26px 0; display: flex; gap: 22px; align-items: flex-start; cursor: pointer; transition: background .15s; }
.ledger-row:hover { background: rgba(160,71,42,0.03); }
.ledger-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-faint); padding-top: 4px; width: 46px; flex-shrink: 0; letter-spacing: 0.02em; }
.ledger-main { flex: 1; min-width: 0; }
.ledger-tags { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
.ledger-area { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rust); }
.ledger-meta { display: flex; gap: 14px; flex-wrap: wrap; }
.ledger-meta span { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.04em; color: var(--ink-soft); }
.ledger-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; line-height: 1.25; }
.ledger-chevron { font-family: 'Fraunces', serif; font-size: 20px; color: var(--ink-faint); flex-shrink: 0; transition: transform .2s, color .2s; padding-top: 2px; }
.ledger-row.expanded .ledger-chevron { transform: rotate(90deg); color: var(--rust); }

.ledger-detail { display: none; margin-top: 22px; padding-top: 22px; border-top: 1px dashed var(--line); }
.ledger-row.expanded .ledger-detail { display: block; }
.ledger-detail p.desc { font-size: 14.5px; line-height: 1.8; color: var(--ink); font-weight: 400; margin-bottom: 22px; white-space: pre-line; max-width: 62ch; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.detail-section h4 { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
.detail-section ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.detail-section li { font-size: 13.5px; color: var(--ink); font-weight: 400; line-height: 1.5; display: flex; gap: 9px; }
.detail-section li::before { content: '—'; color: var(--rust); flex-shrink: 0; }
.apply-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; background: var(--ink); color: var(--surface); font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; padding: 13px 22px; border-radius: var(--radius); border: none; cursor: pointer; transition: background .15s; }
.apply-btn:hover { background: var(--rust-deep); }

.empty-note { font-size: 14px; color: var(--ink-soft); padding: 30px 0; border-top: 1px solid var(--ink); }

/* ═══ MODAL (ficha) ═══ */
.modal-overlay { position: fixed; inset: 0; background: rgba(36,31,26,0.55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
.dossier { background: var(--surface); border-radius: var(--radius); padding: 38px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 12px 50px rgba(36,31,26,0.28); position: relative; margin: auto; border: 1px solid var(--line); }
.dossier.dossier-wide { max-width: 700px; }
.dossier::before { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 34px 34px 0; border-color: transparent var(--rust) transparent transparent; }
.dossier-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--surface); line-height: 1; padding: 4px; z-index: 2; }
.dossier-close:hover { opacity: 0.7; }
.dossier-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rust); margin-bottom: 8px; }
.dossier-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; margin-bottom: 4px; padding-right: 30px; }
.dossier-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-bottom: 28px; letter-spacing: 0.02em; }

.field-label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; margin-top: 20px; }
.field-label:first-of-type { margin-top: 0; }
.field-hint { font-size: 11px; color: var(--ink-faint); margin-top: 6px; font-weight: 400; }
input[type=text], input[type=email], input[type=tel] {
  width: 100%; font-family: 'Fraunces', serif; font-size: 16px; font-weight: 400;
  padding: 8px 2px 10px; border: none; border-bottom: 1px solid var(--line); border-radius: 0;
  background: transparent; color: var(--ink); transition: border-color .15s;
}
input:focus { outline: none; border-color: var(--rust); }
textarea {
  width: 100%; font-family: 'Instrument Sans', sans-serif; font-size: 13.5px; line-height: 1.65;
  padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg); color: var(--ink); transition: border-color .15s; resize: vertical; min-height: 78px;
}
textarea:focus { outline: none; border-color: var(--rust); }
.file-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding: 10px 2px; cursor: pointer; margin-top: 8px; transition: border-color .15s; }
.file-row:hover { border-color: var(--ink-soft); }
.file-row.has-file { border-color: var(--rust); }
.file-row input[type=file] { display: none; }
.file-row-label { font-size: 13px; color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; gap: 8px; }
.file-row-label strong { color: var(--ink); font-weight: 500; }
.file-name { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--rust); flex-shrink: 0; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

.check-row { display: flex; align-items: center; gap: 10px; margin-top: 22px; }
.check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--rust); cursor: pointer; }
.check-row label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.03em; color: var(--ink); cursor: pointer; }

.btn-primary { font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; background: var(--ink); color: var(--surface); border: none; padding: 15px 28px; border-radius: var(--radius); cursor: pointer; transition: background .15s; width: 100%; margin-top: 26px; }
.btn-primary:hover { background: var(--rust-deep); }
.btn-primary:disabled { background: var(--ink-faint); cursor: not-allowed; }
.loading-spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(251,248,241,0.4); border-top-color: var(--surface); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.success-box { background: var(--olive-bg); border: 1px solid var(--olive-line); border-radius: var(--radius); padding: 22px; text-align: center; }
.success-box h3 { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 500; margin-bottom: 8px; color: var(--olive); }
.success-box p { font-size: 13px; color: #4A5240; font-weight: 400; line-height: 1.6; }
.error-box { background: #F7E9E4; border: 1px solid #E0AE9B; border-radius: var(--radius); padding: 12px 16px; font-size: 12.5px; color: var(--rust-deep); margin-top: 14px; }

/* ═══ ADMIN SHELL ═══ */
.admin-shell { display: flex; gap: 48px; align-items: flex-start; }
.admin-rail { width: 190px; flex-shrink: 0; position: sticky; top: 40px; }
.rail-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rust-deep); margin-bottom: 4px; }
.rail-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; font-style: italic; margin-bottom: 28px; }
.rail-nav { display: flex; flex-direction: column; gap: 2px; margin-bottom: 32px; }
.rail-link { display: flex; justify-content: space-between; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.03em; color: var(--ink-soft); background: none; border: none; border-left: 2px solid transparent; padding: 10px 0 10px 14px; cursor: pointer; text-align: left; transition: all .15s; }
.rail-link:hover { color: var(--ink); }
.rail-link.active { color: var(--ink); border-left-color: var(--rust); font-weight: 500; }
.rail-link .count { font-size: 10.5px; color: var(--ink-faint); }
.rail-link.active .count { color: var(--rust); }
.rail-back { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 6px; }
.rail-back:hover { color: var(--rust); }
.admin-main { flex: 1; min-width: 0; }

.admin-topline { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; flex-wrap: wrap; gap: 14px; }
.admin-topline h2 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500; }
.btn-outline { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.05em; text-transform: uppercase; background: none; color: var(--ink); border: 1px solid var(--ink); padding: 10px 18px; border-radius: var(--radius); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-outline:hover { background: var(--ink); color: var(--surface); }

.stat-line { display: flex; gap: 22px; flex-wrap: wrap; margin: 20px 0 24px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-soft); }
.stat-line b { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; color: var(--ink); margin-right: 5px; }
.stat-line b.accent { color: var(--olive); }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-chip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.03em; padding: 7px 14px; border-radius: 99px; border: 1px solid var(--line); background: none; cursor: pointer; color: var(--ink-soft); transition: all .15s; }
.filter-chip.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

/* linhas de vaga/candidatura no admin — mesmo padrão de ledger, com ações */
.admin-row { border-bottom: 1px solid var(--line); padding: 20px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; }
.admin-row-info { flex: 1; min-width: 0; }
.admin-row-info h4 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.admin-row-info p { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.02em; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.status-dot.ativa { background: var(--olive); }
.status-dot.inativa { background: var(--ink-faint); }
.status-word { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
.status-word.ativa { color: var(--olive); }
.row-actions { display: flex; gap: 4px; align-items: flex-start; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.row-actions button, .row-actions a { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.03em; text-transform: uppercase; padding: 7px 12px; border-radius: var(--radius); border: 1px solid transparent; background: none; cursor: pointer; color: var(--ink-soft); text-decoration: none; transition: all .15s; white-space: nowrap; }
.row-actions button:hover, .row-actions a:hover { border-color: var(--line); color: var(--ink); }
.row-actions button.danger:hover { border-color: var(--rust); color: var(--rust-deep); }
.cand-new-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rust); display: inline-block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-soft); font-size: 14px; border-top: 1px solid var(--ink); }
.empty-state .btn-outline { margin-top: 18px; }

@media (max-width: 760px) {
  .admin-shell { flex-direction: column; gap: 24px; }
  .admin-rail { width: 100%; position: static; }
  .rail-nav { flex-direction: row; gap: 18px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
  .rail-link { border-left: none; border-bottom: 2px solid transparent; padding: 0 0 10px; }
  .rail-link.active { border-left: none; border-bottom-color: var(--rust); }
}
@media (max-width: 600px) {
  .page-title { font-size: 32px; }
  .leaf-accent { display: none; }
  .dossier { padding: 28px 22px; }
  .field-row, .field-row-3, .detail-grid { grid-template-columns: 1fr; gap: 18px; }
  .ledger-row { gap: 14px; }
  .ledger-num { width: 30px; font-size: 10px; }
  .admin-row { flex-direction: column; }
  .row-actions { justify-content: flex-start; }
}
</style>
</head>

async function loadVagasPublicas() {
  if (!db) return [];
  try {
    const { data } = await db.from('vagas').select('*').eq('ativa', true).order('created_at', { ascending: false });
    return data || [];
  } catch(e) { return []; }
}
async function loadVagasAdmin() {
  if (!db) return [];
  try {
    const { data } = await db.from('vagas').select('*').order('created_at', { ascending: false });
    return data || [];
  } catch(e) { return []; }
}
async function saveVaga(payload, id) {
  if (!db) return { ok: false, err: 'Banco não configurado' };
  try {
    if (id) {
      const { error } = await db.from('vagas').update(payload).eq('id', id);
      if (error) return { ok: false, err: error.message };
    } else {
      const { error } = await db.from('vagas').insert(payload);
      if (error) return { ok: false, err: error.message };
    }
    return { ok: true };
  } catch(e) { return { ok: false, err: e.message }; }
}
async function setVagaAtiva(id, ativa) {
  if (!db) return;
  try { await db.from('vagas').update({ ativa }).eq('id', id); } catch(e) {}
}
async function deleteVaga(id) {
  if (!db) return;
  try { await db.from('vagas').delete().eq('id', id); } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// SUPABASE — CANDIDATURAS
// ═══════════════════════════════════════════════════════
async function saveCandidatura(data) {
  if (!db) return { ok: false, err: 'Banco não configurado' };
  try {
    let cv_url = null;
    if (data.file) {
      const ext = data.file.name.split('.').pop();
      const path = `${Date.now()}-${data.nome.replace(/\s+/g,'-').toLowerCase()}.${ext}`;
      const { error: upErr } = await db.storage.from('curriculos').upload(path, data.file);
      if (!upErr) {
        const { data: urlData } = db.storage.from('curriculos').getPublicUrl(path);
        cv_url = urlData.publicUrl;
      }
    }
    const { error } = await db.from('candidaturas').insert({
      nome: data.nome, email: data.email, whatsapp: data.whatsapp,
      vaga_id: data.vaga_id, vaga_titulo: data.vaga_titulo,
      cv_url, lida: false
    });
    if (error) return { ok: false, err: error.message };
    return { ok: true, cv_url };
  } catch(e) { return { ok: false, err: e.message }; }
}
async function loadCandidaturas(vagaFilter = null) {
  if (!db) return [];
  try {
    let q = db.from('candidaturas').select('*').order('created_at', { ascending: false });
    if (vagaFilter) q = q.eq('vaga_id', vagaFilter);
    const { data } = await q;
    return data || [];
  } catch(e) { return []; }
}
async function marcarLida(id) {
  if (!db) return;
  try { await db.from('candidaturas').update({ lida: true }).eq('id', id); } catch(e) {}
}
async function deleteCandidatura(id) {
  if (!db) return;
  try { await db.from('candidaturas').delete().eq('id', id); } catch(e) {}
}

// HELPERS
// ═══════════════════════════════════════════════════════
function linesToArray(text) { return (text || '').split('\n').map(s => s.trim()).filter(Boolean); }
function arrayToLines(arr) { return (arr || []).join('\n'); }
function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openApplyModal(vaga) {
  let selectedFile = null;

  modalRoot.innerHTML = `
    <div class="modal-overlay" id="overlay">
      <div class="dossier">
        <button class="dossier-close" id="closeModal">×</button>
        <div id="modalContent">
          <div class="dossier-eyebrow">Ficha de candidatura</div>
          <h3 class="dossier-title">${esc(vaga.title)}</h3>
          <p class="dossier-subtitle mono">${esc(vaga.area)} · ${esc(vaga.local)} · ${esc(vaga.tipo)}</p>

          <label class="field-label">Nome completo *</label>
          <input type="text" id="m-nome" placeholder="Seu nome completo" autocomplete="name">

          <div class="field-row">
            <div>
              <label class="field-label">E-mail *</label>
              <input type="email" id="m-email" placeholder="seu@email.com">
            </div>
            <div>
              <label class="field-label">WhatsApp *</label>
              <input type="tel" id="m-whatsapp" placeholder="(62) 9 0000-0000">
            </div>
          </div>

          <label class="field-label" style="margin-top:22px;">Currículo (PDF ou Word) *</label>
          <div class="file-row" id="fileArea">
            <input type="file" id="m-file" accept=".pdf,.doc,.docx">
            <label class="file-row-label" for="m-file">📎 <strong>Anexar arquivo</strong> · PDF, DOC ou DOCX, máx. 5MB</label>
            <div class="file-name" id="fileName" style="display:none"></div>
          </div>

          <div id="formError" style="display:none"></div>
          <button class="btn-primary" id="submitBtn" disabled>Enviar candidatura</button>
        </div>
      </div>
    </div>
  `;

  const nome = document.getElementById('m-nome');
  const email = document.getElementById('m-email');
  const whatsapp = document.getElementById('m-whatsapp');
  const fileInput = document.getElementById('m-file');
  const fileArea = document.getElementById('fileArea');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');

  function check() {
    submitBtn.disabled = !nome.value.trim() || !email.value.includes('@') || !whatsapp.value.trim() || !selectedFile;
  }
  nome.addEventListener('input', check);
  email.addEventListener('input', check);
  whatsapp.addEventListener('input', check);

  function handleFile(f) {
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Arquivo muito grande. Máximo 5MB.'); return; }
    selectedFile = f;
    fileName.textContent = f.name;
    fileName.style.display = 'block';
    fileArea.classList.add('has-file');
    check();
  }
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
  fileArea.addEventListener('dragover', e => { e.preventDefault(); fileArea.style.borderColor = 'var(--rust)'; });
  fileArea.addEventListener('dragleave', () => fileArea.style.borderColor = '');
  fileArea.addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span>Enviando...';
    document.getElementById('formError').style.display = 'none';

    const result = await saveCandidatura({
      nome: nome.value.trim(), email: email.value.trim(), whatsapp: whatsapp.value.trim(),
      vaga_id: vaga.id, vaga_titulo: vaga.title, file: selectedFile
    });

    if (result.ok) {
      document.getElementById('modalContent').innerHTML = `
        <div class="success-box">
          <h3>Candidatura recebida</h3>
          <p>Sua candidatura para a vaga de <strong>${esc(vaga.title)}</strong> foi recebida.<br>
          A La Vie Consultoria entrará em contato caso seu perfil seja selecionado.</p>
        </div>
        <button class="btn-primary" id="closeSuccess" style="margin-top:16px;background:var(--surface);color:var(--ink);border:1px solid var(--line);">Fechar</button>
      `;
      document.getElementById('closeSuccess').addEventListener('click', closeModal);
    } else {
      document.getElementById('formError').innerHTML = `<div class="error-box">Erro ao enviar: ${esc(result.err)}. Tente novamente.</div>`;
      document.getElementById('formError').style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Enviar candidatura';
    }
  });
}

    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => { filtroCand = btn.dataset.filter; draw(); });
    });
    document.querySelectorAll('.mark-read').forEach(btn => {
      btn.addEventListener('click', async () => {
        await marcarLida(btn.dataset.id);
        const c = candidaturas.find(x => x.id === btn.dataset.id);
        if (c) c.lida = true;
        draw();

    document.querySelectorAll('.del-cand').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remover esta candidatura?')) return;
        await deleteCandidatura(btn.dataset.id);
        candidaturas.splice(candidaturas.findIndex(x => x.id === btn.dataset.id), 1);
        draw();
      });
    });
  }

  async function draw() {
    ADMIN_VAGAS = await loadVagasAdmin();
    if (state.view !== 'admin') return;

    app.innerHTML = `
      <div class="admin-shell">
        <div class="admin-rail">
          <div class="rail-eyebrow mono">Painel do</div>
          <div class="rail-title">recrutador</div>
          <div class="rail-nav">
            <button class="rail-link ${state.adminTab==='vagas'?'active':''}" data-tab="vagas"><span>Vagas</span><span class="count mono">${ADMIN_VAGAS.length}</span></button>
            <button class="rail-link ${state.adminTab==='candidaturas'?'active':''}" data-tab="candidaturas"><span>Candidaturas</span><span class="count mono">${naoLidas || ''}</span></button>
          </div>
          <button class="rail-back" id="backBtn">← Voltar ao site</button>
        </div>
        <div class="admin-main" id="tabContent">${state.adminTab === 'vagas' ? vagasTabHTML() : candTabHTML()}</div>
      </div>
    `;

    document.getElementById('backBtn').addEventListener('click', () => { state.view = 'vagas'; render(); });
    document.querySelectorAll('.rail-link').forEach(btn => {
      btn.addEventListener('click', () => { state.adminTab = btn.dataset.tab; draw(); });
    });

    if (state.adminTab === 'vagas') bindVagasTabEvents();
    else bindCandTabEvents();
  }

  draw();
}

// ═══════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════
function render() {
  if (state.view === 'vagas') renderVagas();
  else if (state.view === 'admin') renderAdmin();
}

document.getElementById('adminBtn').addEventListener('click', () => {
  if (state.view === 'admin') { state.view = 'vagas'; render(); return; }
  const pw = prompt('Senha:');
  if (pw === ADMIN_PASS) { state.view = 'admin'; state.adminTab = 'vagas'; render(); }
  else if (pw !== null) alert('Senha incorreta.');
});

render();
})();
</script>
</body>
</html>
