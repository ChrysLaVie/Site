<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas — La Vie Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--charcoal);
  font-weight:300; line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

:root {
  --bg:        #F2F1ED;
  --bg-alt:    #E8E4DE;
  --dark:      #1a1917;
  --charcoal:  #3A3A3A;
  --muted:     #7A7A7A;
  --sand:      #D8CFC4;
  --sand-dark: #B8AFA4;
  --white:     #FFFFFF;
  --border: rgba(58,58,58,0.1);
  --radius:    4px;
  --ok: #5f6b4c;
  --ok-bg: #e8ece2;
  --err: #c0392b;
  --err-bg: #fbeae7;
}

.serif { font-family:'Cormorant Garamond',serif; }
.eyebrow {
  display:block; font-size:0.68rem; font-weight:500;
  letter-spacing:0.25em; text-transform:uppercase;
  color:var(--sand-dark); margin-bottom:1.2rem;
}
.section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,4vw,3.4rem);
  font-weight:300; line-height:1.1; margin-bottom:1.8rem;
  color:var(--charcoal);
}
.section-title em { font-style:italic; color:var(--dark); }

/* Nav */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0.85rem 5vw;
  background:rgba(26,25,23,0.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.nav-logo { display:flex; align-items:center; text-decoration:none; flex-shrink:0; }
.nav-logo img { height:52px; width:auto; max-width:180px; object-fit:contain; display:block; }
.nav-cta {
  background:rgba(242,241,237,0.1); border:1px solid rgba(242,241,237,0.2); color:#F2F1ED;
  padding:0.6rem 1.4rem; border-radius:var(--radius); text-decoration:none;
  font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; font-weight:500;
  cursor:pointer; transition:all 0.2s; font-family:inherit;
}
.nav-cta:hover { background:rgba(242,241,237,0.18); border-color:rgba(242,241,237,0.4); }

#app { padding-top:96px; }

/* Hero */
.vagas-hero { padding:2.5rem max(2rem,8vw) 3rem; background:var(--bg); }
.vagas-hero p.lead { color:var(--muted); font-size:0.95rem; line-height:1.85; max-width:560px; font-weight:300; }

/* Lista de vagas */
.vagas-list-wrap { padding:0 max(2rem,8vw) 6rem; background:var(--bg); }
.vagas-list { display:flex; flex-direction:column; gap:1.4rem; max-width:820px; }
.vaga-card {
  border:1px solid var(--border); border-radius:var(--radius); background:var(--white);
  transition:border-color 0.3s; overflow:hidden; cursor:pointer;
}
.vaga-card:hover { border-color:var(--charcoal); }
.vaga-card-top { padding:1.8rem 2rem; display:flex; justify-content:space-between; align-items:flex-start; gap:1.2rem; }
.vaga-setor { font-size:0.63rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--sand-dark); font-weight:600; display:block; margin-bottom:0.5rem; }
.vaga-card h3 { font-family:'Cormorant Garamond',serif; font-size:1.35rem; font-weight:500; color:var(--charcoal); margin-bottom:0.7rem; }
.vaga-meta { display:flex; gap:0.9rem; flex-wrap:wrap; }
.vaga-meta span { font-size:0.78rem; color:var(--muted); }
.vaga-arrow { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--sand-dark); flex-shrink:0; transition:transform 0.2s; }
.vaga-card.open .vaga-arrow { transform:rotate(90deg); }
.vaga-detail { display:none; padding:0 2rem 2rem; border-top:1px solid var(--border); }
.vaga-card.open .vaga-detail { display:block; padding-top:1.8rem; }
.vaga-detail p.desc { font-size:0.9rem; color:var(--charcoal); line-height:1.8; font-weight:300; margin-bottom:1.8rem; white-space:pre-line; }
.vaga-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
.vaga-detail h4 { font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--sand-dark); font-weight:600; margin-bottom:0.8rem; }
.vaga-detail ul { list-style:none; display:flex; flex-direction:column; gap:0.5rem; }
.vaga-detail li { font-size:0.83rem; color:var(--charcoal); line-height:1.6; font-weight:300; display:flex; gap:0.5rem; }
.vaga-detail li::before { content:'—'; color:var(--sand-dark); flex-shrink:0; }
.btn-primary {
  display:inline-block; background:var(--charcoal); color:var(--white);
  padding:0.9rem 2rem; text-decoration:none; border-radius:var(--radius);
  font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase;
  font-weight:500; transition:background 0.2s, transform 0.15s;
  border:none; cursor:pointer; font-family:inherit;
}
.btn-primary:hover { background:var(--dark); transform:translateY(-2px); }
.btn-primary:disabled { background:var(--sand-dark); cursor:not-allowed; transform:none; }
.empty-note { color:var(--muted); font-size:0.9rem; font-weight:300; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(26,25,23,0.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.modal-box { background:var(--white); border-radius:var(--radius); padding:2.4rem; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 12px 50px rgba(0,0,0,0.25); position:relative; margin:auto; }
.modal-box.wide { max-width:680px; }
.modal-close { position:absolute; top:1.1rem; right:1.3rem; background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--muted); line-height:1; }
.modal-close:hover { color:var(--charcoal); }
.modal-box h3 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:500; color:var(--charcoal); margin-bottom:0.3rem; padding-right:1.5rem; }
.modal-box .modal-sub { font-size:0.8rem; color:var(--muted); margin-bottom:1.6rem; }

.form-group { margin-bottom:1rem; }
.form-group label.fl { display:block; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--sand-dark); font-weight:600; margin-bottom:0.5rem; }
.form-group input,
.form-group select,
.form-group textarea {
  width:100%; background:var(--bg);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:0.85rem 1rem; font-family:inherit;
  font-size:0.88rem; color:var(--charcoal);
  outline:none; transition:border-color 0.2s; resize:none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--charcoal); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
textarea.ta { min-height:76px; }

.file-drop {
  border:1px dashed var(--border); border-radius:var(--radius); padding:1.2rem;
  text-align:center; cursor:pointer; transition:border-color 0.2s; background:var(--bg);
}
.file-drop:hover { border-color:var(--sand-dark); }
.file-drop.has-file { border-color:var(--charcoal); border-style:solid; }
.file-drop input[type=file] { display:none; }
.file-drop-label { font-size:0.83rem; color:var(--muted); cursor:pointer; }
.file-drop-label strong { color:var(--charcoal); }
.file-name { font-size:0.78rem; color:var(--charcoal); font-weight:500; margin-top:0.4rem; }

.check-row { display:flex; align-items:center; gap:0.6rem; margin-top:1.2rem; }
.check-row input { width:16px; height:16px; accent-color:var(--charcoal); cursor:pointer; }
.check-row label { font-size:0.8rem; color:var(--charcoal); cursor:pointer; }

.success-box { background:var(--ok-bg); border-radius:var(--radius); padding:1.6rem; text-align:center; }
.success-box h3 { font-family:'Cormorant Garamond',serif; font-size:1.3rem; color:var(--ok); margin-bottom:0.5rem; }
.success-box p { font-size:0.85rem; color:#4A5240; line-height:1.6; font-weight:300; }
.error-box { background:var(--err-bg); border-radius:var(--radius); padding:0.8rem 1rem; font-size:0.8rem; color:var(--err); margin-top:0.8rem; }
.loading-spin { display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Admin */
.admin-wrap { padding:2.5rem max(2rem,8vw) 6rem; background:var(--bg); max-width:1000px; }
.admin-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1rem; flex-wrap:wrap; gap:1rem; }
.back-link { font-size:0.78rem; color:var(--muted); background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:0.4rem; margin-bottom:1.6rem; font-family:inherit; }
.back-link:hover { color:var(--charcoal); }

.admin-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:2.2rem; }
.tab-btn2 {
  background:none; border:none; cursor:pointer; font-family:inherit;
  font-size:0.78rem; font-weight:400; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); padding:0.8rem 1.5rem 0.8rem 0; margin-right:1.5rem;
  border-bottom:2px solid transparent; transition:color 0.2s;
}
.tab-btn2.active { color:var(--charcoal); border-bottom-color:var(--sand-dark); font-weight:500; }

.stat-row { display:flex; gap:2.4rem; margin-bottom:2rem; flex-wrap:wrap; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:2.1rem; font-weight:500; color:var(--charcoal); line-height:1; }
.stat-num.ok { color:var(--ok); }
.stat-label { font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:0.3rem; }

.filter-row2 { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:1.6rem; }
.filter-chip2 { font-size:0.72rem; letter-spacing:0.03em; padding:0.5rem 1rem; border-radius:20px; border:1px solid var(--border); background:none; cursor:pointer; color:var(--muted); transition:all 0.15s; font-family:inherit; }
.filter-chip2.active { background:var(--charcoal); color:var(--white); border-color:var(--charcoal); }

.entry-row {
  display:flex; justify-content:space-between; align-items:flex-start; gap:1.2rem;
  padding:1.4rem 1.6rem; border:1px solid var(--border); border-radius:var(--radius);
  background:var(--white); margin-bottom:0.7rem; transition:border-color 0.2s;
}
.entry-row:hover { border-color:var(--sand-dark); }
.entry-info h4 { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:500; color:var(--charcoal); margin-bottom:0.3rem; display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
.entry-info p { font-size:0.78rem; color:var(--muted); }
.status-dot2 { width:6px; height:6px; border-radius:50%; display:inline-block; }
.status-dot2.on { background:var(--ok); }
.status-dot2.off { background:var(--sand-dark); }
.entry-actions { display:flex; gap:0.3rem; flex-wrap:wrap; justify-content:flex-end; flex-shrink:0; }
.entry-actions button, .entry-actions a {
  font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase; padding:0.4rem 0.7rem;
  border-radius:var(--radius); border:none; background:none; cursor:pointer;
  color:var(--sand-dark); text-decoration:none; transition:color 0.15s; font-family:inherit; white-space:nowrap;
}
.entry-actions button:hover, .entry-actions a:hover { color:var(--charcoal); }

.cand-row { border:1px solid var(--border); border-radius:var(--radius); background:var(--white); padding:1.3rem 1.6rem; margin-bottom:0.8rem; transition:border-color 0.2s; }
.cand-row:hover { border-color:var(--sand-dark); }
.cand-top { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:0.8rem; }
.cand-top h4 { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:500; color:var(--charcoal); }
.cand-top p { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; }
.cand-stages { display:flex; flex-wrap:wrap; gap:0.6rem; }
.stage-chip { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.8rem; border-radius:var(--radius); background:var(--bg); font-size:0.75rem; color:var(--muted); }
.stage-chip.done { background:var(--ok-bg); color:var(--ok); }
.stage-chip.pending { color:var(--sand-dark); }
.stage-chip button, .stage-chip a { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; background:none; border:none; color:inherit; text-decoration:underline; cursor:pointer; font-family:inherit; padding:0; }
.entry-actions button.danger:hover { color:var(--err); }
.new-dot { width:6px; height:6px; border-radius:50%; background:var(--err); display:inline-block; }

.empty-admin { text-align:center; padding:3.5rem 1rem; color:var(--muted); font-size:0.9rem; border-top:1px solid var(--border); }
.empty-admin .btn-primary { margin-top:1.2rem; }

/* Footer */
footer {
  background:var(--dark); padding:2.5rem 8vw;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;
}
.footer-logo img { height:44px; width:auto; mix-blend-mode:screen; opacity:0.85; }
footer p { font-size:0.75rem; color:rgba(242,241,237,0.35); }
footer p a { color:inherit; text-decoration:none; }
.footer-links { display:flex; gap:1.4rem; align-items:center; }
.footer-links a { color:rgba(242,241,237,0.35); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 0.2s; }
.footer-links a:hover { color:var(--sand-dark); }

@media (max-width:760px) {
  .vaga-detail-grid, .form-row, .form-row-3 { grid-template-columns:1fr; gap:1.2rem; }
  .entry-row { flex-direction:column; }
  .entry-actions { justify-content:flex-start; }
  footer { flex-direction:column; text-align:center; }
}
</style>
</head>

// ── HELPERS ──
function linesToArray(text) { return (text || '').split('\n').map(s => s.trim()).filter(Boolean); }
function arrayToLines(arr) { return (arr || []).join('\n'); }
function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  document.getElementById('closeModal').addEventListener('click', closeModal);

  submitBtn.addEventListener('click', async () => {

    document.getElementById('formError').style.display = 'none';
    const result = await saveCandidatura({ nome:nome.value.trim(), email:email.value.trim(), whatsapp:whatsapp.value.trim(), vaga_id:vaga.id, vaga_titulo:vaga.title, file:selectedFile });

        <a href="${discUrl}" class="btn-primary" id="goDisc" style="width:100%;margin-top:0.8rem;text-align:center;text-decoration:none;">Continuar para o Teste DISC →</a>`;
      setTimeout(() => { window.location.href = discUrl; }, 2000);
    } else {
      document.getElementById('formError').innerHTML = `<div class="error-box">Erro ao enviar: ${esc(result.err)}. Tente novamente.</div>`;
      document.getElementById('formError').style.display = 'block';
      submitBtn.disabled = false; submitBtn.innerHTML = 'Enviar candidatura';
    }
  });
}

// ── PDF: resultado do DISC (regenerado a partir dos dados salvos) ──
function buildDiscPDFFromRow(row) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 52;
  let y = 66;
  const INK = [58,58,58], SOFT = [122,119,110], BORDER = [216,207,196];

  const scores = row.most || {};
  const primary = row.primary_profile, secondary = row.secondary_profile;
  const vals = Object.values(scores);
  const minS = vals.length ? Math.min(...vals) : 0;
  const maxS = vals.length ? Math.max(...vals) : 0;
  const range = (maxS - minS) || 1;

  doc.setFont('times', 'italic'); doc.setFontSize(18); doc.setTextColor(...INK);
  doc.text('La Vie Consultoria', M, y);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...SOFT);
  doc.text('AVALIAÇÃO COMPORTAMENTAL DISC — RESUMO PARA O RECRUTADOR', M, y + 13);
  doc.setDrawColor(...BORDER); doc.line(M, y + 24, W - M, y + 24);
  y += 46;

  doc.setFont('times', 'italic'); doc.setFontSize(22); doc.setTextColor(...INK);
  doc.text(row.name || '', M, y);
  y += 16;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(...SOFT);
  doc.text(`${row.email || ''} · ${row.phone || ''} · ${new Date(row.created_at).toLocaleDateString('pt-BR')}`, M, y);
  y += 28;

  if (primary && DIM[primary]) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(...INK);
    doc.text(`Perfil predominante: ${DIM[primary].name} (${primary})`, M, y);
    y += 16;
    if (secondary && DIM[secondary]) {
      doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(...SOFT);
      doc.text(`Perfil secundário: ${DIM[secondary].name} (${secondary})`, M, y);
      y += 20;
    }
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...INK);
    const sumLines = doc.splitTextToSize(DIM[primary].summary, W - M * 2);
    doc.text(sumLines, M, y);
    y += sumLines.length * 13 + 20;
  }

  const barX = M + 120, barW = W - M - barX - 40;
  ['D','I','S','C'].forEach(d => {
    const score = scores[d];
    if (score === undefined) return;
    const pct = (score - minS) / range;
    const rgb = DIM[d].color.match(/\w\w/g).map(h => parseInt(h,16));
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(...INK);
    doc.text(DIM[d].name, M, y + 8);
    doc.setFillColor(238,235,226); doc.roundedRect(barX, y, barW, 9, 2, 2, 'F');
    doc.setFillColor(...rgb); doc.roundedRect(barX, y, Math.max(barW * pct, 4), 9, 2, 2, 'F');
    doc.setFontSize(9); doc.setTextColor(...SOFT);
    doc.text((score > 0 ? '+' : '') + score, barX + barW + 8, y + 8);
    y += 24;
  });

  doc.setFontSize(8); doc.setTextColor(180,175,168);
  doc.text('La Vie Consultoria · lavieconsultoria.com · Documento de uso interno do processo seletivo.', M, 822);
  doc.save('disc-' + (row.name || 'candidato').toLowerCase().replace(/\s+/g,'-') + '.pdf');
}

// ── PDF: resposta do formulário da vaga ──
function buildFormsPDFFromRow(s) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 52;
  let y = 66;
  const INK = [58,58,58], SOFT = [122,119,110], BORDER = [216,207,196], OK = [74,122,66], ERR = [192,57,43];

  function pageBreak(next) { if (y + next > 800) { doc.addPage(); y = 60; } }

  doc.setFont('times', 'italic'); doc.setFontSize(18); doc.setTextColor(...INK);
  doc.text('La Vie Consultoria', M, y);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...SOFT);
  doc.text('FORMULÁRIO DA VAGA — RESUMO PARA O RECRUTADOR', M, y + 13);
  doc.setDrawColor(...BORDER); doc.line(M, y + 24, W - M, y + 24);
  y += 46;

  doc.setFont('times', 'italic'); doc.setFontSize(22); doc.setTextColor(...INK);
  doc.text(s.nome || '', M, y);
  y += 16;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(...SOFT);
  doc.text(`${s.email || ''} · ${s.whatsapp || ''} · ${new Date(s.created_at).toLocaleDateString('pt-BR')}`, M, y);
  y += 12;
  doc.text(`Vaga: ${s.vaga_titulo || ''}`, M, y);
  y += 26;

  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(...INK);
  doc.text('Condições da vaga', M, y); y += 16;
  [['Contratação PJ', s.ciente_pj], ['Remuneração R$5.000 + comissão', s.ciente_remuneracao], ['Presencial em Goiânia/GO', s.ciente_presencial], ['Horário de funcionamento', s.ciente_horario]].forEach(([label, val]) => {
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    doc.setTextColor(...(val ? OK : ERR)); doc.text(val ? '✓' : '✗', M, y);
    doc.setTextColor(...INK); doc.text(label, M + 14, y);
    y += 14;
  });
  if (s.pretensao_salarial) { doc.setTextColor(...SOFT); doc.text(`Pretensão salarial informada: ${s.pretensao_salarial}`, M, y); y += 14; }
  y += 14;

  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(...INK);
  doc.text(`Questionário técnico — nota: ${s.technical_score ?? '—'} / 5`, M, y);
  y += 18;

  (Array.isArray(s.technical_answers) ? s.technical_answers : []).forEach((a, i) => {
    pageBreak(46);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...INK);
    const qLines = doc.splitTextToSize(`${i + 1}. ${a.pergunta}`, W - M * 2);
    doc.text(qLines, M, y); y += qLines.length * 11 + 3;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.setTextColor(...(a.correta ? OK : ERR));
    const respLines = doc.splitTextToSize(`Resposta: ${a.escolhida || '(não respondida)'} ${a.correta ? '(correta)' : '(incorreta)'}`, W - M * 2 - 10);
    doc.text(respLines, M + 10, y); y += respLines.length * 11 + 10;
  });

  doc.setFontSize(8); doc.setTextColor(180,175,168);
  doc.text('La Vie Consultoria · lavieconsultoria.com · Documento de uso interno do processo seletivo.', M, 822);
  doc.save('formulario-' + (s.nome || 'candidato').toLowerCase().replace(/\s+/g,'-') + '.pdf');
}

  function candListHTML(filter) {
    const lista = filter === 'todas' ? candidaturas : filter === 'novas' ? candidaturas.filter(c => !c.lida) : candidaturas.filter(c => c.vaga_id === filter);
    return lista.length === 0 ? '<p class="empty-note">Nenhuma candidatura encontrada.</p>' :
      lista.map(c => `
        <div class="entry-row">
          <div class="entry-info">
            <h4>${esc(c.nome)} ${!c.lida ? '<span class="new-dot"></span>' : ''}</h4>
            <p>${esc(c.email)} · ${esc(c.whatsapp) || '—'} · ${esc(c.vaga_titulo)} · ${new Date(c.created_at).toLocaleDateString('pt-BR')}</p>
          </div>
          <div class="entry-actions">
            ${c.cv_url ? `<a href="${c.cv_url}" target="_blank">Ver currículo</a>` : '<span style="font-size:0.7rem;color:var(--muted);padding:0.4rem 0.7rem;">Sem currículo</span>'}
            ${!c.lida ? `<button class="mark-read" data-id="${c.id}">Marcar lida</button>` : ''}
            <button class="danger del-cand" data-id="${c.id}">Remover</button>
          </div>
        </div>
      `).join('');
  }

  function candTabHTML() {
    return `
      <div class="admin-top"><h2 class="section-title" style="font-size:1.8rem;margin-bottom:0;">Candidaturas recebidas</h2></div>
      <div class="stat-row">
        <div><div class="stat-num">${candidaturas.length}</div><div class="stat-label">Total</div></div>
        <div><div class="stat-num ok">${naoLidas}</div><div class="stat-label">Não lidas</div></div>
      </div>
      <div class="filter-row2">
        <button class="filter-chip2 ${filtroCand==='todas'?'active':''}" data-filter="todas">Todas</button>
        <button class="filter-chip2 ${filtroCand==='novas'?'active':''}" data-filter="novas">Não lidas (${naoLidas})</button>
        ${ADMIN_VAGAS.map(v => `<button class="filter-chip2 ${filtroCand===v.id?'active':''}" data-filter="${v.id}">${esc(v.title)}</button>`).join('')}
      </div>
      <div id="candList">${candListHTML(filtroCand)}</div>
    `;
  }

  function unifTabHTML() {
    if (candidatosUnificados.length === 0) {
      return `
        <div class="admin-top"><h2 class="section-title" style="font-size:1.8rem;margin-bottom:0;">Candidatos</h2></div>
        <p class="empty-note">Nenhum candidato encontrado ainda em nenhuma das etapas.</p>
      `;
    }
    return `
      <div class="admin-top"><h2 class="section-title" style="font-size:1.8rem;margin-bottom:0;">Candidatos</h2></div>
      <p style="color:var(--muted);font-size:0.82rem;margin-bottom:1.4rem;">Cruza automaticamente currículo, resultado do DISC e formulário da vaga pelo e-mail informado em cada etapa.</p>
      ${candidatosUnificados.map((c, idx) => `
        <div class="cand-row" data-idx="${idx}">
          <div class="cand-top">
            <div>
              <h4>${esc(c.nome)}</h4>
              <p>${esc(c.email)} · ${esc(c.whatsapp) || '—'} ${c.vaga_titulo ? '· ' + esc(c.vaga_titulo) : ''}</p>
            </div>
          </div>
          <div class="cand-stages">
            <div class="stage-chip ${c.candidatura ? 'done' : 'pending'}">
              ${c.candidatura ? (c.candidatura.cv_url ? `📄 Currículo · <a href="${c.candidatura.cv_url}" target="_blank">Ver</a>` : '📄 Candidatura sem currículo') : '📄 Ainda não se candidatou'}
            </div>
            <div class="stage-chip ${c.disc ? 'done' : 'pending'}">
              ${c.disc ? `🧭 DISC: ${DIM[c.disc.primary_profile]?.name || c.disc.primary_profile || '—'} · <button class="pdf-disc-btn" data-idx="${idx}">Baixar PDF</button>` : '🧭 Ainda não fez o DISC'}
            </div>
            <div class="stage-chip ${c.forms ? 'done' : 'pending'}">
              ${c.forms ? `📝 Formulário: ${c.forms.technical_score ?? '—'}/5 · <button class="pdf-forms-btn" data-idx="${idx}">Baixar PDF</button>` : '📝 Ainda não respondeu o formulário'}
            </div>
          </div>
        </div>
      `).join('')}
    `;
  }

  function bindVagasTabEvents() {
    const openNew = () => openVagaForm(null, () => draw());
    document.getElementById('newVagaBtn')?.addEventListener('click', openNew);
    document.getElementById('newVagaBtnEmpty')?.addEventListener('click', openNew);
    document.querySelectorAll('.edit-vaga').forEach(btn => btn.addEventListener('click', () => openVagaForm(ADMIN_VAGAS.find(v => v.id === btn.dataset.id), () => draw())));
    document.querySelectorAll('.toggle-vaga').forEach(btn => btn.addEventListener('click', async () => { await setVagaAtiva(btn.dataset.id, btn.dataset.ativa !== 'true'); await draw(); }));
    document.querySelectorAll('.del-vaga').forEach(btn => btn.addEventListener('click', async () => { if (!confirm('Remover esta vaga permanentemente? As candidaturas já recebidas continuam no histórico.')) return; await deleteVaga(btn.dataset.id); await draw(); }));
  }
  function bindCandTabEvents() {
    document.querySelectorAll('.filter-chip2').forEach(btn => btn.addEventListener('click', () => { filtroCand = btn.dataset.filter; draw(); }));
    document.querySelectorAll('.mark-read').forEach(btn => btn.addEventListener('click', async () => { await marcarLida(btn.dataset.id); const c = candidaturas.find(x => x.id === btn.dataset.id); if (c) c.lida = true; draw(); }));
    document.querySelectorAll('.del-cand').forEach(btn => btn.addEventListener('click', async () => { if (!confirm('Remover esta candidatura?')) return; await deleteCandidatura(btn.dataset.id); candidaturas.splice(candidaturas.findIndex(x => x.id === btn.dataset.id), 1); draw(); }));
  }
  function bindUnifTabEvents() {
    document.querySelectorAll('.pdf-disc-btn').forEach(btn => btn.addEventListener('click', () => buildDiscPDFFromRow(candidatosUnificados[btn.dataset.idx].disc)));
    document.querySelectorAll('.pdf-forms-btn').forEach(btn => btn.addEventListener('click', () => buildFormsPDFFromRow(candidatosUnificados[btn.dataset.idx].forms)));
  }

  async function draw() {
    ADMIN_VAGAS = await loadVagasAdmin();
    if (state.view !== 'admin') return;
    app.innerHTML = `
      <div class="admin-wrap">
        <button class="back-link" id="backBtn">← Voltar às vagas</button>
        <span class="eyebrow">Painel do recrutador</span>
        <div class="admin-tabs">
          <button class="tab-btn2 ${state.adminTab==='vagas'?'active':''}" data-tab="vagas">Vagas (${ADMIN_VAGAS.length})</button>
          <button class="tab-btn2 ${state.adminTab==='candidaturas'?'active':''}" data-tab="candidaturas">Candidaturas ${naoLidas>0?`(${naoLidas} novas)`:''}</button>
          <button class="tab-btn2 ${state.adminTab==='candidatos'?'active':''}" data-tab="candidatos">Candidatos (${candidatosUnificados.length})</button>
        </div>
        <div id="tabContent">${state.adminTab === 'vagas' ? vagasTabHTML() : state.adminTab === 'candidaturas' ? candTabHTML() : unifTabHTML()}</div>
      </div>
    `;
    document.getElementById('backBtn').addEventListener('click', () => { state.view = 'vagas'; render(); });
    document.querySelectorAll('.tab-btn2').forEach(btn => btn.addEventListener('click', () => { state.adminTab = btn.dataset.tab; draw(); }));
    if (state.adminTab === 'vagas') bindVagasTabEvents();
    else if (state.adminTab === 'candidaturas') bindCandTabEvents();
    else bindUnifTabEvents();
  }
  draw();
}

// ── ROUTER ──
function render() {
  adminBtn.textContent = state.view === 'admin' ? 'Voltar às vagas' : 'Painel do recrutador';
  if (state.view === 'vagas') renderVagas();
  else if (state.view === 'admin') renderAdmin();
}

adminBtn.addEventListener('click', () => {
  if (state.view === 'admin') { state.view = 'vagas'; render(); return; }
  const pw = prompt('Senha:');
  if (pw === ADMIN_PASS) { state.view = 'admin'; state.adminTab = 'vagas'; render(); }
  else if (pw !== null) alert('Senha incorreta.');
});

render();
})();
</script>
</body>
</html>
