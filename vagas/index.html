<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas — La Vie Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg: #F5F1EA; --surface: #FFFFFF; --ink: #2C2B28; --ink-soft: #7A776E;
  --border: #E2DBC9; --accent: #9B6B52; --radius: 8px;
  --shadow: 0 2px 24px rgba(0,0,0,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Jost', sans-serif; -webkit-font-smoothing: antialiased; }

.topbar { display: flex; justify-content: space-between; align-items: center; max-width: 860px; margin: 0 auto; padding: 22px 20px 0; }
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.brand-mark { height: 38px; width: auto; filter: invert(1) brightness(0.3); }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand-l1 { font-weight: 500; font-size: 13px; letter-spacing: 0.07em; }
.brand-l2 { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); }
.admin-btn { background: none; border: 1px solid var(--border); color: var(--ink-soft); font-family: 'Jost', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 99px; cursor: pointer; transition: all .15s; }
.admin-btn:hover { border-color: var(--ink-soft); color: var(--ink); }

#app { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

/* HERO */
.page-hero { margin-bottom: 48px; }
.eyebrow { display: block; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 500; line-height: 1.15; margin-bottom: 14px; }
.page-title em { font-style: italic; }
.page-sub { font-size: 15px; line-height: 1.75; color: var(--ink-soft); font-weight: 300; max-width: 52ch; }

/* VAGAS LIST */
.vagas-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }
.vaga-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; box-shadow: var(--shadow); cursor: pointer; transition: border-color .2s, box-shadow .2s; position: relative; }
.vaga-card:hover { border-color: var(--accent); box-shadow: 0 4px 32px rgba(0,0,0,0.1); }
.vaga-card.active { border-color: var(--accent); }
.vaga-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.vaga-info { flex: 1; }
.vaga-area { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.vaga-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; margin-bottom: 10px; }
.vaga-meta { display: flex; gap: 16px; flex-wrap: wrap; }
.vaga-tag { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 5px; }
.vaga-arrow { color: var(--ink-soft); font-size: 18px; transition: transform .2s; flex-shrink: 0; margin-top: 4px; }
.vaga-card.active .vaga-arrow { transform: rotate(90deg); color: var(--accent); }
.vaga-desc { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.vaga-card.active .vaga-desc { display: block; }
.vaga-desc p { font-size: 14px; line-height: 1.75; color: var(--ink); font-weight: 300; margin-bottom: 14px; }
.vaga-desc h4 { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; margin-top: 18px; }
.vaga-desc ul { list-style: none; display: flex; flex-direction: column; gap: 6px; padding: 0; }
.vaga-desc li { font-size: 14px; color: var(--ink); font-weight: 300; line-height: 1.5; display: flex; gap: 8px; }
.vaga-desc li::before { content: '→'; color: var(--accent); flex-shrink: 0; }
.vaga-apply-btn { display: inline-block; margin-top: 20px; background: var(--ink); color: #fff; font-family: 'Jost', sans-serif; font-weight: 600; font-size: 13px; padding: 12px 24px; border-radius: 99px; border: none; cursor: pointer; letter-spacing: 0.03em; transition: background .15s; }
.vaga-apply-btn:hover { background: #3a3935; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 36px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 60px rgba(0,0,0,0.2); position: relative; }
.modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink-soft); line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--ink); }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.modal-subtitle { font-size: 13px; color: var(--ink-soft); margin-bottom: 24px; font-weight: 300; }

/* FORM */
.field-label { display: block; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; margin-bottom: 7px; margin-top: 16px; }
.field-label:first-of-type { margin-top: 0; }
input[type=text], input[type=email], input[type=tel] {
  width: 100%; font-family: 'Cormorant Garamond', serif; font-size: 16px;
  padding: 12px 14px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); color: var(--ink); transition: border-color .15s;
}
input:focus { outline: none; border-color: var(--ink-soft); }
.file-area { border: 1.5px dashed var(--border); border-radius: 6px; padding: 20px; text-align: center; cursor: pointer; transition: border-color .15s; margin-top: 8px; background: var(--bg); }
.file-area:hover { border-color: var(--ink-soft); }
.file-area.has-file { border-color: var(--accent); background: #F9F5F0; }
.file-area input[type=file] { display: none; }
.file-area-label { font-size: 13px; color: var(--ink-soft); cursor: pointer; }
.file-area-label strong { color: var(--ink); }
.file-name { font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 6px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-primary { font-family: 'Jost', sans-serif; font-weight: 600; font-size: 14px; background: var(--ink); color: #fff; border: none; padding: 14px 28px; border-radius: 99px; cursor: pointer; transition: background .15s; width: 100%; margin-top: 20px; letter-spacing: 0.03em; }
.btn-primary:hover { background: #3a3935; }
.btn-primary:disabled { background: #C4BFB4; cursor: not-allowed; }
.loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.success-box { background: #EEF4EC; border: 1px solid #B8D4B0; border-radius: 6px; padding: 20px; text-align: center; }
.success-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 8px; color: #2D5A27; }
.success-box p { font-size: 13px; color: #4A7A42; font-weight: 300; line-height: 1.6; }
.error-box { background: #FDF0EE; border: 1px solid #E8B4A8; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #7A2000; margin-top: 12px; }

/* ADMIN */
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.admin-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; min-width: 120px; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: var(--ink); }
.stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-top: 2px; }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.filter-btn { font-family: 'Jost', sans-serif; font-size: 12px; padding: 7px 16px; border-radius: 99px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--ink-soft); transition: all .15s; }
.filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.cand-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 18px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.cand-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.cand-info p { font-size: 13px; color: var(--ink-soft); font-weight: 300; }
.cand-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.cand-tag { font-size: 11px; color: var(--ink-soft); background: var(--bg); padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); }
.cand-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
.cand-actions a, .cand-actions button { font-family: 'Jost', sans-serif; font-size: 12px; padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--ink); text-decoration: none; transition: all .15s; white-space: nowrap; }
.cand-actions a:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.cand-actions button:hover { border-color: #c0392b; color: #c0392b; }
.empty-state { text-align: center; padding: 50px 20px; color: var(--ink-soft); font-size: 14px; }

.back-btn { font-family: 'Jost', sans-serif; font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
.back-btn:hover { color: var(--ink); }

@media (max-width: 600px) {
  .page-title { font-size: 30px; }
  .vaga-card { padding: 20px; }
  .modal { padding: 24px 18px; }
  .field-row { grid-template-columns: 1fr; }
  .cand-card { flex-direction: column; }
}
</style>
</head>

async function saveCandidatura(data) {
  if (!db) return { ok: false, err: 'Banco não configurado' };
  try {
    // Upload do currículo
    let cv_url = null;
    if (data.file) {
      const ext = data.file.name.split('.').pop();
      const path = `${Date.now()}-${data.nome.replace(/\s+/g,'-').toLowerCase()}.${ext}`;
      const { error: upErr } = await db.storage.from('curriculos').upload(path, data.file);
      if (!upErr) {
        const { data: urlData } = db.storage.from('curriculos').getPublicUrl(path);
        cv_url = urlData.publicUrl;
      }
    }
    const { error } = await db.from('candidaturas').insert({
      nome: data.nome, email: data.email, whatsapp: data.whatsapp,
      vaga_id: data.vaga_id, vaga_titulo: data.vaga_titulo,
      cv_url, lida: false
    });
    if (error) return { ok: false, err: error.message };
    return { ok: true, cv_url };
  } catch(e) { return { ok: false, err: e.message }; }
}

async function loadCandidaturas(vagaFilter = null) {
  if (!db) return [];
  try {
    let q = db.from('candidaturas').select('*').order('created_at', { ascending: false });
    if (vagaFilter) q = q.eq('vaga_id', vagaFilter);
    const { data } = await q;
    return data || [];
  } catch(e) { return []; }
}

async function marcarLida(id) {
  if (!db) return;
  try { await db.from('candidaturas').update({ lida: true }).eq('id', id); } catch(e) {}
}

async function deleteCandidatura(id) {
  if (!db) return;
  try { await db.from('candidaturas').delete().eq('id', id); } catch(e) {}
}

function openModal(vaga) {
  let selectedFile = null;

  modalRoot.innerHTML = `
    <div class="modal-overlay" id="overlay">
      <div class="modal">
        <button class="modal-close" id="closeModal">×</button>
        <div id="modalContent">
          <h3 class="modal-title">${vaga.title}</h3>
          <p class="modal-subtitle">${vaga.area} · ${vaga.local} · ${vaga.tipo}</p>

          <label class="field-label">Nome completo *</label>
          <input type="text" id="m-nome" placeholder="Seu nome completo" autocomplete="name">

          <div class="field-row">
            <div>
              <label class="field-label">E-mail *</label>
              <input type="email" id="m-email" placeholder="seu@email.com">
            </div>
            <div>
              <label class="field-label">WhatsApp *</label>
              <input type="tel" id="m-whatsapp" placeholder="(62) 9 0000-0000">
            </div>
          </div>

          <label class="field-label" style="margin-top:16px;">Currículo (PDF ou Word) *</label>
          <div class="file-area" id="fileArea">
            <input type="file" id="m-file" accept=".pdf,.doc,.docx">
            <label class="file-area-label" for="m-file">
              📎 <strong>Clique para selecionar</strong> ou arraste seu currículo aqui<br>
              <span style="font-size:11px;margin-top:4px;display:block;">PDF, DOC ou DOCX · máx. 5MB</span>
            </label>
            <div class="file-name" id="fileName" style="display:none"></div>
          </div>

          <div id="formError" style="display:none"></div>
          <button class="btn-primary" id="submitBtn" disabled>Enviar candidatura</button>
        </div>
      </div>
    </div>
  `;

  const nome = document.getElementById('m-nome');
  const email = document.getElementById('m-email');
  const whatsapp = document.getElementById('m-whatsapp');
  const fileInput = document.getElementById('m-file');
  const fileArea = document.getElementById('fileArea');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');

  function check() {
    submitBtn.disabled = !nome.value.trim() || !email.value.includes('@') || !whatsapp.value.trim() || !selectedFile;
  }

  nome.addEventListener('input', check);
  email.addEventListener('input', check);
  whatsapp.addEventListener('input', check);

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Arquivo muito grande. Máximo 5MB.'); return; }
    selectedFile = f;
    fileName.textContent = f.name;
    fileName.style.display = 'block';
    fileArea.classList.add('has-file');
    check();
  });

  // Drag over file area
  fileArea.addEventListener('dragover', e => { e.preventDefault(); fileArea.style.borderColor = 'var(--accent)'; });
  fileArea.addEventListener('dragleave', () => fileArea.style.borderColor = '');
  fileArea.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Arquivo muito grande. Máximo 5MB.'); return; }
    selectedFile = f;
    fileName.textContent = f.name;
    fileName.style.display = 'block';
    fileArea.classList.add('has-file');
    check();
  });

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span>Enviando...';
    document.getElementById('formError').style.display = 'none';

    const result = await saveCandidatura({
      nome: nome.value.trim(),
      email: email.value.trim(),
      whatsapp: whatsapp.value.trim(),
      vaga_id: vaga.id,
      vaga_titulo: vaga.title,
      file: selectedFile
    });

    if (result.ok) {
      document.getElementById('modalContent').innerHTML = `
        <div class="success-box">
          <h3>Candidatura recebida! ✓</h3>
          <p>Sua candidatura para a vaga de <strong>${vaga.title}</strong> foi recebida.<br>
          A La Vie Consultoria entrará em contato caso seu perfil seja selecionado.</p>
        </div>
        <button class="btn-primary" id="closeSuccess" style="margin-top:16px;background:none;color:var(--ink);border:1px solid var(--border);">Fechar</button>
      `;
      document.getElementById('closeSuccess').addEventListener('click', closeModal);
    } else {
      document.getElementById('formError').innerHTML = `<div class="error-box">Erro ao enviar: ${result.err}. Tente novamente.</div>`;
      document.getElementById('formError').style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Enviar candidatura';
    }
  });
}

function closeModal() { modalRoot.innerHTML = ''; }

  let filtroAtivo = 'todas';

  function renderList(filter) {
    const lista = filter === 'todas' ? all :
                  filter === 'novas' ? all.filter(c => !c.lida) :
                  all.filter(c => c.vaga_id === filter);

    return lista.length === 0 ? '<div class="empty-state">Nenhuma candidatura encontrada.</div>' :
      lista.map(c => `
        <div class="cand-card" data-id="${c.id}">
          <div class="cand-info">
            <h4>${c.nome} ${!c.lida ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6B7A5E;margin-left:8px;vertical-align:middle;"></span>' : ''}</h4>
            <p>${c.email} · ${c.whatsapp || '—'}</p>
            <div class="cand-meta">
              <span class="cand-tag">${c.vaga_titulo}</span>
              <span class="cand-tag">${new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
              ${c.lida ? '<span class="cand-tag">✓ Lida</span>' : '<span class="cand-tag" style="border-color:#6B7A5E;color:#6B7A5E;">Nova</span>'}
            </div>
          </div>
          <div class="cand-actions">
            ${c.cv_url ? `<a href="${c.cv_url}" target="_blank">Ver currículo</a>` : '<span style="font-size:12px;color:var(--ink-soft);padding:7px 14px;">Sem currículo</span>'}
            ${!c.lida ? `<button class="mark-read" data-id="${c.id}">Marcar lida</button>` : ''}
            <button class="del-cand" data-id="${c.id}">Remover</button>
          </div>
        </div>
      `).join('');
  }

  function draw() {
    app.innerHTML = `
      <button class="back-btn" id="backBtn">← Voltar às vagas</button>
      <div class="admin-header">
        <div>
          <span class="eyebrow">Painel do recrutador</span>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;">Candidaturas recebidas</h2>
        </div>
      </div>
      <div class="admin-stats">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#6B7A5E">${naoLidas}</div><div class="stat-label">Não lidas</div></div>
        ${Object.entries(vagaCounts).map(([v,n]) => `<div class="stat-box"><div class="stat-num">${n}</div><div class="stat-label" style="font-size:10px;">${v}</div></div>`).join('')}
      </div>
      <div class="filter-row">
        <button class="filter-btn ${filtroAtivo==='todas'?'active':''}" data-filter="todas">Todas</button>
        <button class="filter-btn ${filtroAtivo==='novas'?'active':''}" data-filter="novas">Não lidas (${naoLidas})</button>
        ${VAGAS.map(v => `<button class="filter-btn ${filtroAtivo===v.id?'active':''}" data-filter="${v.id}">${v.title}</button>`).join('')}
      </div>
      <div id="candList">${renderList(filtroAtivo)}</div>
    `;

    document.getElementById('backBtn').addEventListener('click', () => { state.view = 'vagas'; render(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filtroAtivo = btn.dataset.filter;
        draw();
      });
    });

    document.querySelectorAll('.mark-read').forEach(btn => {
      btn.addEventListener('click', async () => {
        await marcarLida(btn.dataset.id);
        const c = all.find(x => x.id === btn.dataset.id);
        if (c) c.lida = true;
        draw();
      });
    });

    document.querySelectorAll('.del-cand').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remover esta candidatura?')) return;
        await deleteCandidatura(btn.dataset.id);
        all.splice(all.findIndex(x => x.id === btn.dataset.id), 1);
        draw();
      });
    });
  }

  draw();
}

// ═══════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════
function render() {
  if (state.view === 'vagas') renderVagas();
  else if (state.view === 'admin') renderAdmin();
}

document.getElementById('adminBtn').addEventListener('click', () => {
  if (state.view === 'admin') { state.view = 'vagas'; render(); return; }
  const pw = prompt('Senha:');
  if (pw === ADMIN_PASS) { state.view = 'admin'; render(); }
  else if (pw !== null) alert('Senha incorreta.');
});

render();
})();
</script>
</body>
</html>
