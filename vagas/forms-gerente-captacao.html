<title>Formulário da Vaga — Gerente de Captação de Alunos e Televendas — La Vie Consultoria</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--charcoal);
  font-weight: 300; line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg:        #F2F1ED;
  --bg-alt:    #E8E4DE;
  --dark:      #1a1917;
  --charcoal:  #3A3A3A;
  --muted:     #7A7A7A;
  --sand:      #D8CFC4;
  --sand-dark: #B8AFA4;
  --white:     #FFFFFF;
  --border: rgba(58,58,58,0.1);
  --radius:    4px;
  --ok: #4A7A42;
  --ok-bg: #e8ece2;
  --err: #c0392b;
  --err-bg: #fbeae7;
}

.eyebrow { display: block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--sand-dark); margin-bottom: 1rem; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.7rem,3.4vw,2.6rem); font-weight: 300; line-height: 1.15; margin-bottom: 1rem; color: var(--charcoal); }
.section-title em { font-style: italic; color: var(--dark); }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 5vw;
  background: rgba(26,25,23,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-logo { display: flex; align-items: center; text-decoration: none; }
.nav-logo img { height: 48px; width: auto; max-width: 170px; object-fit: contain; }
.nav-tag { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(242,241,237,0.55); }
.nav-admin-btn {
  background: rgba(242,241,237,0.1); border: 1px solid rgba(242,241,237,0.2); color: #F2F1ED;
  font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  padding: 8px 16px; border-radius: var(--radius); cursor: pointer; transition: all .15s;
}
.nav-admin-btn:hover { background: rgba(242,241,237,0.18); border-color: rgba(242,241,237,0.4); }

.admin-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.4rem; flex-wrap: wrap; gap: 1rem; }
.back-link { font-size: 0.78rem; color: var(--muted); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1.4rem; font-family: inherit; }
.back-link:hover { color: var(--charcoal); }
.admin-row {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 1.2rem;
  padding: 1.3rem 1.6rem; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--white); margin-bottom: 0.7rem; transition: border-color 0.2s;
}
.admin-row:hover { border-color: var(--sand-dark); }
.admin-row-info h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 500; color: var(--charcoal); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.admin-row-info p { font-size: 0.78rem; color: var(--muted); }
.score-pill { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; padding: 0.2rem 0.6rem; border-radius: 99px; background: var(--bg-alt); color: var(--charcoal); }
.score-pill.high { background: var(--ok-bg); color: var(--ok); }
.score-pill.low { background: var(--err-bg); color: var(--err); }
.admin-row-actions { display: flex; gap: 0.4rem; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.admin-row-actions button { font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.45rem 0.8rem; border-radius: var(--radius); border: none; background: none; cursor: pointer; color: var(--sand-dark); font-family: inherit; transition: color 0.15s; white-space: nowrap; }
.admin-row-actions button:hover { color: var(--charcoal); }
.admin-row-actions button.danger:hover { color: var(--err); }

#app { max-width: 720px; margin: 0 auto; padding: 118px 20px 90px; }

.hero { margin-bottom: 2.4rem; }
.hero p.lead { color: var(--muted); font-size: 0.95rem; line-height: 1.85; font-weight: 300; }

.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.2rem; margin-bottom: 1.4rem; }
.card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 500; color: var(--charcoal); margin-bottom: 1rem; }
.card p.body-text { font-size: 0.92rem; line-height: 1.85; color: var(--charcoal); font-weight: 300; }

.item-list { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
.item-list li { font-size: 0.88rem; color: var(--charcoal); line-height: 1.6; font-weight: 300; display: flex; gap: 0.6rem; }
.item-list li::before { content: '—'; color: var(--sand-dark); flex-shrink: 0; }

.benefit-list { list-style: none; display: flex; flex-direction: column; gap: 0.9rem; }
.benefit-list li { font-size: 0.88rem; color: var(--charcoal); line-height: 1.65; font-weight: 300; padding: 0.9rem 1.1rem; background: var(--bg); border-radius: var(--radius); }
.benefit-list li strong { font-weight: 500; }

.check-block { display: flex; gap: 0.7rem; align-items: flex-start; padding: 1rem 0; border-bottom: 1px solid var(--border); }
.check-block:last-child { border-bottom: none; }
.check-block input[type=checkbox] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--charcoal); cursor: pointer; flex-shrink: 0; }
.check-block label { font-size: 0.88rem; color: var(--charcoal); line-height: 1.6; font-weight: 300; cursor: pointer; }
.check-block label strong { font-weight: 500; }

.quiz-q { padding: 1.1rem 0; border-bottom: 1px solid var(--border); }
.quiz-q:last-child { border-bottom: none; }
.quiz-q-title { font-size: 0.9rem; color: var(--charcoal); font-weight: 500; margin-bottom: 0.7rem; line-height: 1.5; }
.quiz-opt { display: flex; gap: 0.6rem; align-items: flex-start; padding: 0.4rem 0; cursor: pointer; }
.quiz-opt input[type=radio] { width: 17px; height: 17px; margin-top: 2px; accent-color: var(--charcoal); cursor: pointer; flex-shrink: 0; }
.quiz-opt label { font-size: 0.85rem; color: var(--charcoal); font-weight: 300; line-height: 1.5; cursor: pointer; }
.quiz-num { display: inline-block; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--sand-dark); margin-right: 0.4rem; }

.field-label { display: block; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sand-dark); font-weight: 600; margin-bottom: 0.5rem; margin-top: 1.1rem; }
.field-label:first-of-type { margin-top: 0; }
.field-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; font-weight: 300; }
input[type=text], input[type=email], input[type=tel] {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.85rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--charcoal);
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--charcoal); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.btn-primary {
  display: inline-block; background: var(--charcoal); color: var(--white);
  padding: 0.95rem 2.2rem; border: none; border-radius: var(--radius);
  font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500;
  cursor: pointer; transition: background 0.2s, transform 0.15s; width: 100%; font-family: inherit;
}
.btn-primary:hover { background: var(--dark); transform: translateY(-2px); }
.btn-primary:disabled { background: var(--sand-dark); cursor: not-allowed; transform: none; }
.loading-spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { background: var(--err-bg); border-radius: var(--radius); padding: 0.8rem 1rem; font-size: 0.8rem; color: var(--err); margin-top: 1rem; }
.success-card { text-align: center; padding: 3rem 2rem; }
.success-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--ok); margin-bottom: 0.8rem; }
.success-card p { color: var(--muted); font-size: 0.92rem; line-height: 1.7; max-width: 46ch; margin: 0 auto; }

@media (max-width: 600px) {
  .field-row { grid-template-columns: 1fr; }
  .card { padding: 1.6rem; }
}
</style>
</head>

      <ul class="benefit-list">
        <li><strong>13º salário:</strong> pago via nota fiscal, no mês subsequente ao mês de aniversário do contrato.</li>
        <li><strong>Recesso:</strong> ao completar 1 ano de contrato, 30 dias de recesso sem prejuízo do valor da nota fiscal.</li>
        <li><strong>Bolsa de estudos:</strong> inicia em 60%. Após o 1º ano de contrato, sobe para 70%. Após o 2º ano de contrato, chega a 80% (exceto para os cursos de Odontologia e Gastronomia).</li>
      </ul>
    </div>

    <div class="card">
      <h3>Condições da vaga — ciência e concordância</h3>
      <div class="check-block">
        <input type="checkbox" id="c-pj">
        <label for="c-pj">Estou ciente de que a contratação é no modelo <strong>PJ</strong>.</label>
      </div>
      <div class="check-block">
        <input type="checkbox" id="c-remuneracao">
        <label for="c-remuneracao">Estou ciente de que a remuneração é de <strong>R$ 5.000,00 + comissão sobre resultados</strong>.</label>
      </div>
      <div class="check-block">
        <input type="checkbox" id="c-presencial">
        <label for="c-presencial">Estou ciente de que a vaga é <strong>presencial, em Goiânia/GO</strong>.</label>
      </div>
      <div class="check-block">
        <input type="checkbox" id="c-horario">
        <label for="c-horario">Estou ciente do <strong>horário de funcionamento</strong>: segunda a sexta, das 08h às 18h, e sábados alternados (um sim, um não), das 08h às 12h.</label>
      </div>

      <label class="field-label">Pretensão salarial (preencha apenas se for diferente do valor informado acima)</label>
      <input type="text" id="f-pretensao" placeholder="Ex: R$ 6.000,00">
      <div class="field-hint">Deixe em branco se o valor de R$ 5.000,00 + comissão atende sua expectativa.</div>
    </div>

    <div class="card">
      <h3>Perguntas técnicas</h3>
      <p class="body-text" style="margin-bottom:1.2rem;">Responda com base no que você já sabe hoje sobre gestão comercial e captação de alunos. Não há problema em não saber alguma — respeite sua sinceridade.</p>
      <div id="quizList"></div>
    </div>

    <div class="card">
      <h3>Seus dados</h3>
      <label class="field-label">Nome completo *</label>
      <input type="text" id="f-nome" placeholder="Seu nome completo" value="${esc(prefill.nome)}">
      <div class="field-row">
        <div>
          <label class="field-label">E-mail *</label>
          <input type="email" id="f-email" placeholder="seu@email.com" value="${esc(prefill.email)}">
        </div>
        <div>
          <label class="field-label">WhatsApp *</label>
          <input type="tel" id="f-whatsapp" placeholder="(62) 9 0000-0000">
        </div>
      </div>
      <div id="formError" style="display:none"></div>
      <div style="margin-top:1.6rem;">
        <button class="btn-primary" id="submitBtn" disabled>Enviar formulário</button>
      </div>
    </div>
  `;

  document.getElementById('quizList').innerHTML = QUIZ.map((item, qi) => `
    <div class="quiz-q" data-qi="${qi}">
      <div class="quiz-q-title"><span class="quiz-num">${qi + 1}.</span>${esc(item.q)}</div>
      ${item.options.map((opt, oi) => `
        <div class="quiz-opt">
          <input type="radio" name="quiz-${qi}" id="quiz-${qi}-${oi}" value="${oi}">
          <label for="quiz-${qi}-${oi}">${esc(opt)}</label>
        </div>
      `).join('')}
    </div>
  `).join('');

  const nome = document.getElementById('f-nome');
  const email = document.getElementById('f-email');
  const whatsapp = document.getElementById('f-whatsapp');
  const cPj = document.getElementById('c-pj');
  const cRem = document.getElementById('c-remuneracao');
  const cPres = document.getElementById('c-presencial');
  const cHor = document.getElementById('c-horario');
  const submitBtn = document.getElementById('submitBtn');

  function check() {
    const allAnswered = QUIZ.every((_, qi) => document.querySelector(`input[name="quiz-${qi}"]:checked`));
    submitBtn.disabled = !(
      nome.value.trim() &&
      email.value.includes('@') &&
      whatsapp.value.trim() &&
      cPj.checked && cRem.checked && cPres.checked && cHor.checked &&
      allAnswered
    );
  }
  [nome, email, whatsapp, cPj, cRem, cPres, cHor].forEach(el => el.addEventListener('input', check));
  document.getElementById('quizList').addEventListener('change', check);

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spin"></span>Enviando...';
    document.getElementById('formError').style.display = 'none';

    const answers = QUIZ.map((item, qi) => {
      const checked = document.querySelector(`input[name="quiz-${qi}"]:checked`);
      const chosen = checked ? parseInt(checked.value, 10) : null;
      return { pergunta: item.q, escolhida: chosen !== null ? item.options[chosen] : null, correta: chosen === item.correct };
    });
    const technicalScore = answers.filter(a => a.correta).length;

    const result = await saveForm({
      nome: nome.value.trim(),
      email: email.value.trim(),
      whatsapp: whatsapp.value.trim(),
      vaga_titulo: prefill.vaga,
      pretensao_salarial: document.getElementById('f-pretensao').value.trim() || null,
      ciente_pj: cPj.checked,
      ciente_remuneracao: cRem.checked,
      ciente_presencial: cPres.checked,
      ciente_horario: cHor.checked,
      technical_score: technicalScore,
      technical_answers: answers
    });

    if (result.ok) {
      app.innerHTML = `
        <div class="card success-card">
          <h2>Formulário recebido ✓</h2>
          <p>Obrigado, ${esc(nome.value.trim())}. Suas respostas para a vaga de <strong>${esc(prefill.vaga)}</strong> foram recebidas. A equipe da La Vie Consultoria vai analisar seu perfil e entrará em contato pelos dados informados.</p>
        </div>
      `;
    } else {
      const errBox = document.getElementById('formError');
      errBox.innerHTML = `<div class="error-box">Erro ao enviar: ${esc(result.err)}. Tente novamente.</div>`;
      errBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Enviar formulário';
      check();
    }
  });
}

// ═══════════════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════════════
async function renderAdmin() {
  document.getElementById('navTag').textContent = 'Painel do recrutador';
  app.innerHTML = `<p style="color:var(--muted);">Carregando candidatos...</p>`;

  const subs = await loadSubmissions();
  if (state.view !== 'admin') return;

  if (subs.length === 0) {
    app.innerHTML = `
      <button class="back-link" id="backBtn">← Voltar ao formulário</button>
      <span class="eyebrow">Painel do recrutador</span>
      <h1 class="section-title">Respostas do <em>formulário</em></h1>
      <p style="color:var(--muted);font-size:0.9rem;">Nenhuma resposta recebida ainda.</p>
    `;
    document.getElementById('backBtn').addEventListener('click', () => { state.view = 'form'; render(); });
    return;
  }

  app.innerHTML = `
    <button class="back-link" id="backBtn">← Voltar ao formulário</button>
    <div class="admin-top">
      <div>
        <span class="eyebrow">Painel do recrutador</span>
        <h1 class="section-title" style="margin-bottom:0;">Respostas do <em>formulário</em></h1>
      </div>
    </div>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.4rem;">${subs.length} candidato(s) · Gerente de Captação de Alunos e Televendas</p>
    <div id="subsList"></div>
  `;

  document.getElementById('backBtn').addEventListener('click', () => { state.view = 'form'; render(); });

  document.getElementById('subsList').innerHTML = subs.map(s => {
    const score = s.technical_score ?? null;
    const scoreClass = score === null ? '' : (score >= 4 ? 'high' : (score <= 2 ? 'low' : ''));
    return `
      <div class="admin-row" data-id="${s.id}">
        <div class="admin-row-info">
          <h4>${esc(s.nome)} ${score !== null ? `<span class="score-pill ${scoreClass}">${score}/5 no técnico</span>` : ''}</h4>
          <p>${esc(s.email)} · ${esc(s.whatsapp) || '—'} · ${new Date(s.created_at).toLocaleDateString('pt-BR')}</p>
        </div>
        <div class="admin-row-actions">
          <button class="pdf-btn" data-id="${s.id}">Baixar PDF</button>
          <button class="danger del-btn" data-id="${s.id}">Remover</button>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.pdf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sub = subs.find(x => x.id === btn.dataset.id);
      buildSubmissionPDF(sub);
    });
  });
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remover esta resposta permanentemente?')) return;
      await deleteSubmission(btn.dataset.id);
      renderAdmin();
    });
  });
}

// ═══════════════════════════════════════════════════════
// PDF — resumo completo pro recrutador
// ═══════════════════════════════════════════════════════
function buildSubmissionPDF(s) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 52;
  let y = 66;

  const INK = [58, 58, 58];
  const SOFT = [122, 119, 110];
  const BORDER = [216, 207, 196];
  const BG = [242, 241, 237];
  const OK = [74, 122, 66];
  const ERR = [192, 57, 43];

  function checkPageBreak(next) {
    if (y + next > 800) { doc.addPage(); y = 60; }
  }

  doc.setFont('times', 'italic');
  doc.setFontSize(18);
  doc.setTextColor(...INK);
  doc.text('La Vie Consultoria', M, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(...SOFT);
  doc.text('FORMULÁRIO DA VAGA — RESUMO PARA O RECRUTADOR', M, y + 13);
  doc.setDrawColor(...BORDER);
  doc.line(M, y + 24, W - M, y + 24);
  y += 46;

  doc.setFont('times', 'italic');
  doc.setFontSize(22);
  doc.setTextColor(...INK);
  doc.text(s.nome || '', M, y);
  y += 16;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(...SOFT);
  doc.text(`${s.email || ''} · ${s.whatsapp || ''} · Enviado em ${new Date(s.created_at).toLocaleDateString('pt-BR')}`, M, y);
  y += 12;
  doc.text(`Vaga: ${s.vaga_titulo || ''}`, M, y);
  y += 26;

  // Ciência das condições
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10.5);
  doc.setTextColor(...INK);
  doc.text('Condições da vaga', M, y);
  y += 16;
  const conds = [
    ['Contratação PJ', s.ciente_pj],
    ['Remuneração R$5.000 + comissão', s.ciente_remuneracao],
    ['Presencial em Goiânia/GO', s.ciente_presencial],
    ['Horário de funcionamento', s.ciente_horario]
  ];
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9.5);
  conds.forEach(([label, val]) => {
    doc.setTextColor(...(val ? OK : ERR));
    doc.text(val ? '✓' : '✗', M, y);
    doc.setTextColor(...INK);
    doc.text(label, M + 14, y);
    y += 14;
  });
  if (s.pretensao_salarial) {
    doc.setTextColor(...SOFT);
    doc.text(`Pretensão salarial informada: ${s.pretensao_salarial}`, M, y);
    y += 14;
  }
  y += 14;

  // Pontuação técnica
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10.5);
  doc.setTextColor(...INK);
  doc.text(`Questionário técnico — nota: ${s.technical_score ?? '—'} / 5`, M, y);
  y += 18;

  const answers = Array.isArray(s.technical_answers) ? s.technical_answers : [];
  answers.forEach((a, i) => {
    checkPageBreak(46);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...INK);
    const qLines = doc.splitTextToSize(`${i + 1}. ${a.pergunta}`, W - M * 2);
    doc.text(qLines, M, y);
    y += qLines.length * 11 + 3;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...(a.correta ? OK : ERR));
    const respLines = doc.splitTextToSize(`Resposta: ${a.escolhida || '(não respondida)'} ${a.correta ? '(correta)' : '(incorreta)'}`, W - M * 2 - 10);
    doc.text(respLines, M + 10, y);
    y += respLines.length * 11 + 10;
  });

  doc.setFontSize(8);
  doc.setTextColor(180, 175, 168);
  doc.text('La Vie Consultoria · lavieconsultoria.com · Documento de uso interno do processo seletivo.', M, 822);

  doc.save('formulario-' + (s.nome || 'candidato').toLowerCase().replace(/\s+/g, '-') + '.pdf');
}

// ═══════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════
function render() {
  if (state.view === 'form') { document.getElementById('navTag').textContent = 'Etapa 3 de 3 · Formulário da vaga'; renderForm(); }
  else if (state.view === 'admin') renderAdmin();
}

document.getElementById('adminBtn').addEventListener('click', () => {
  if (state.view === 'admin') { state.view = 'form'; render(); return; }
  const pw = prompt('Senha:');
  if (pw === ADMIN_PASS) { state.view = 'admin'; render(); }
  else if (pw !== null) alert('Senha incorreta.');
});

render();
})();
</script>
